ave de Tornozelo do 50/50 (Straight Ankle Lock)","categoria":"Finalização","faixa":"marrom","posicao":"50/50","objetivo":"Finalizar o tornozelo do oponente a partir da posição 50/50, usando pressão no tendão de Aquiles.","passos":["Na posição 50/50, controle o pé do oponente junto ao seu peito, sola do pé virada para você.","Posicione o antebraço por baixo do tendão de Aquiles dele.","Feche a chave trazendo a outra mão para reforçar a pressão do antebraço.","Estenda o quadril para trás, aplicando pressão gradual no tendão."],"dicas":["Controlar bem o joelho do oponente impede que ele gire para aliviar a pressão.","Aplique a pressão de forma progressiva, dando tempo do parceiro bater."],"erros":["Deixar o pé do oponente girar durante a chave, o que reduz a eficácia.","Puxar em vez de estender o quadril, perdendo a linha de pressão correta."]},{"id":"t075","videoSearch":"https://www.youtube.com/results?search_query=Estrangulamento%20Peruvian%20Necktie%20bjj%20tecnica","nome":"Estrangulamento Peruvian Necktie","categoria":"Finalização","faixa":"marrom","posicao":"Turtle","objetivo":"Estrangular o oponente que está de quatro apoios, envolvendo o pescoço dele com as pernas.","passos":["Com o oponente de quatro apoios e você ao lado, passe um braço por baixo do pescoço dele.","Gire o corpo, jogando uma perna por cima das costas dele até envolver o pescoço com as pernas.","Cruze os pés, travando o triângulo de pernas ao redor do pescoço do oponente.","Estenda o corpo para trás, fechando o estrangulamento com a pressão das pernas."],"dicas":["O braço que passa pelo pescoço antes de girar ajuda a guiar o corpo do oponente durante a queda.","Controlar o braço dele evita que ele apoie a mão e escape antes de você travar as pernas."],"erros":["Girar o corpo sem antes prender o pescoço com o braço, perdendo o controle inicial.","Deixar os pés destravados, o que permite ao oponente sair da posição."]},{"id":"t076","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%20Tornado%20(Tornado%20Guard%20Sweep)%20bjj%20tecnica","nome":"Raspagem Tornado (Tornado Guard Sweep)","categoria":"Raspagem","faixa":"marrom","posicao":"De La Riva","objetivo":"Usar um giro invertido do corpo para desequilibrar o oponente e chegar às costas ou finalizar.","passos":["A partir de uma guarda De La Riva profunda, incline o corpo para o lado, apoiando o ombro no chão.","Gire o quadril por baixo do oponente, invertendo a posição do corpo (guarda invertida).","Use o gancho de De La Riva para desequilibrar o oponente durante o giro.","Complete a rotação chegando às costas dele ou finalizando a raspagem por cima."],"dicas":["A inversão exige treino de mobilidade — pratique o giro isoladamente antes de aplicar em treino livre.","Manter o gancho de De La Riva ativo durante toda a inversão é o que sustenta o movimento."],"erros":["Perder o gancho de guarda durante a inversão, permitindo que o oponente passe por cima.","Girar sem desequilibrar o oponente antes, o que facilita a defesa dele."]},{"id":"t077","videoSearch":"https://www.youtube.com/results?search_query=Passagem%20por%20Quebra%20de%20Guarda%20em%20P%C3%A9%20(Standing%20Guard%20Break)%20bjj%20tecnica","nome":"Passagem por Quebra de Guarda em Pé (Standing Guard Break)","categoria":"Passagem de Guarda","faixa":"marrom","posicao":"Em Pé","objetivo":"Levantar-se dentro da guarda fechada do oponente para quebrá-la e iniciar a passagem de pé.","passos":["Dentro da guarda fechada, controle o quadril ou o cinto do oponente com as duas mãos.","Levante-se apoiando um pé por vez, mantendo a coluna reta e o quadril baixo.","Uma vez de pé, pressione o quadril para frente e para baixo, forçando a abertura da guarda.","Assim que a guarda abrir, escolha a passagem (toreando, empilhamento) para finalizar."],"dicas":["Levantar com a coluna reta protege as costas e mantém o equilíbrio.","Manter o quadril controlado do oponente durante toda a subida evita raspagens."],"erros":["Levantar-se com as costas curvadas, perdendo equilíbrio e força.","Soltar o controle de quadril ao ficar de pé, abrindo espaço para raspagens."]},{"id":"t078","videoSearch":"https://www.youtube.com/results?search_query=Estrangulamento%20Bulldog%20Choke%20bjj%20tecnica","nome":"Estrangulamento Bulldog Choke","categoria":"Finalização","faixa":"marrom","posicao":"Costas","objetivo":"Estrangular o oponente a partir do controle de costas, usando a própria gola dele sobre o ombro.","passos":["Com as costas do oponente controladas, passe uma mão por cima do ombro dele e agarre a gola do lado oposto.","Passe a outra mão por baixo do braço dele, reforçando a pegada na mesma gola.","Gire o corpo levemente para o lado, alinhando o ângulo de pressão.","Puxe a gola para baixo e para o lado, fechando a pressão sobre o pescoço."],"dicas":["A pegada por cima do ombro cria um ângulo diferente do estrangulamento tradicional — treine a coordenação das duas mãos.","Manter os ganchos ou o controle das costas ativo evita que o oponente gire e escape."],"erros":["Perder o controle das costas ao buscar a pegada da gola.","Puxar em linha reta em vez de ajustar o ângulo do corpo."]},{"id":"t079","videoSearch":"https://www.youtube.com/results?search_query=Trava%20de%20Kimura%20pelas%20Costas%20(Back%20Kimura%20Trap)%20bjj%20tecnica","nome":"Trava de Kimura pelas Costas (Back Kimura Trap)","categoria":"Finalização","faixa":"marrom","posicao":"Costas","objetivo":"Prender o braço do oponente em kimura a partir do controle de costas, limitando a defesa dele.","passos":["Com as costas do oponente controladas e um braço dele cruzado no próprio corpo, capture o pulso desse braço.","Gire o corpo, trazendo o braço dele para o formato de \"L\" enquanto mantém os ganchos ou o gancho de perna.","Trave a chave passando o braço por baixo do cotovelo dele e segurando o próprio pulso.","Gire o punho em direção às costas dele, aplicando a torção no ombro."],"dicas":["Manter o controle das costas (ganchos ou corpo a corpo) durante toda a aplicação evita que o oponente gire e escape.","Aproveite o momento em que o oponente tenta se defender cruzando o braço no corpo."],"erros":["Perder o controle das costas durante a rotação do braço.","Tentar a chave sem antes capturar bem o pulso do oponente."]},{"id":"t080","videoSearch":"https://www.youtube.com/results?search_query=Chave%20de%20Joelho%20Invertida%20do%2050%2F50%20(Inside%20Sankaku)%20bjj%20tecnica","nome":"Chave de Joelho Invertida do 50/50 (Inside Sankaku)","categoria":"Finalização","faixa":"marrom","posicao":"50/50","objetivo":"Finalizar o joelho do oponente usando as próprias pernas cruzadas em torno da perna dele.","passos":["Na posição 50/50, ao invés de controlar o pé com as mãos, cruze as próprias pernas em torno da perna dele (sankaku).","Ajuste o ângulo do corpo para alinhar a pressão diretamente na articulação do joelho.","Controle o corpo do oponente com os braços para impedir que ele gire durante a chave.","Feche a tesoura das pernas de forma gradual, aplicando a pressão na articulação."],"dicas":["Como envolve alto risco de lesão, a aplicação deve ser sempre lenta e controlada em treino.","O alinhamento correto do corpo evita que a pressão vire rotação, que é mais perigosa."],"erros":["Fechar a tesoura rapidamente, sem tempo para o parceiro reagir.","Perder o alinhamento, transformando a chave reta em uma torção indesejada."]},{"id":"t081","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%2050%2F50%20para%20as%20Costas%20bjj%20tecnica","nome":"Raspagem 50/50 para as Costas","categoria":"Raspagem","faixa":"marrom","posicao":"50/50","objetivo":"Sair da posição neutra do 50/50 diretamente para o controle de costas do oponente.","passos":["No 50/50, controle o pé de dentro do oponente com uma mão, limitando a rotação dele.","Gire o próprio corpo por baixo, na direção contrária ao gancho de pernas.","Solte gradualmente o gancho enquanto desliza para o lado das costas dele.","Insira os ganchos de costas assim que completar o giro."],"dicas":["O controle do pé impede que o oponente acompanhe o giro e recupere a posição neutra.","A troca do gancho de pernas pelo controle de costas deve ser gradual, nunca abrupta."],"erros":["Soltar o gancho de uma vez, dando chance do oponente se reposicionar.","Girar sem controlar o pé dele, permitindo que ele acompanhe o movimento."]},{"id":"t082","videoSearch":"https://www.youtube.com/results?search_query=Passagem%20da%20Guarda%20Lasso%20(Lasso%20Guard%20Pass)%20bjj%20tecnica","nome":"Passagem da Guarda Lasso (Lasso Guard Pass)","categoria":"Passagem de Guarda","faixa":"marrom","posicao":"Lasso Guard","objetivo":"Neutralizar a manga enrolada da guarda lasso e avançar para a passagem.","passos":["Sinta a manga enrolada em volta da sua perna na guarda lasso.","Gire o braço preso para desenrolar a manga, ao mesmo tempo que abaixa o quadril.","Controle a perna do lasso com a mão livre, removendo-a do caminho.","Avance o corpo para o lado liberado, consolidando o controle lateral."],"dicas":["Abaixar o quadril facilita desenrolar a manga presa na perna.","Remover a perna do lasso com a mão, e não só se afastando, agiliza a passagem."],"erros":["Tentar puxar o braço para se soltar sem abaixar o quadril, perdendo a base.","Ignorar a perna do lasso, permitindo que o oponente reajuste o controle."]},{"id":"t083","videoSearch":"https://www.youtube.com/results?search_query=Crucifixo%20do%20Turtle%20(Crucifix)%20bjj%20tecnica","nome":"Crucifixo do Turtle (Crucifix)","categoria":"Finalização","faixa":"marrom","posicao":"Turtle","objetivo":"Imobilizar os dois braços do oponente na posição de turtle para abrir caminho a um estrangulamento.","passos":["Ao lado do oponente em turtle, prenda um braço dele entre as suas pernas.","Controle o outro braço por cima, cruzando-o junto ao pescoço dele.","Ajuste o quadril para trás, imobilizando ambos os braços simultaneamente.","A partir daí, busque um estrangulamento pelas costas, já com a defesa das mãos neutralizada."],"dicas":["A imobilização dos dois braços é o que torna essa posição tão forte para finalizações.","Ajuste o corpo lentamente para não perder o controle de um dos braços durante o processo."],"erros":["Tentar prender os dois braços ao mesmo tempo sem antes garantir um deles com segurança.","Ficar muito solto no quadril, permitindo que o oponente gire e escape."]},{"id":"t084","videoSearch":"https://www.youtube.com/results?search_query=Chave%20de%20Tornozelo%20da%20Meia-Guarda%20(Estima%20Lock%20Introdu%C3%A7%C3%A3o)%20bjj%20tecnica","nome":"Chave de Tornozelo da Meia-Guarda (Estima Lock Introdução)","categoria":"Finalização","faixa":"marrom","posicao":"Meia-Guarda","objetivo":"Finalizar o tornozelo do oponente a partir de um controle avançado de perna dentro da meia-guarda.","passos":["Da meia-guarda, controle a perna de apoio do oponente com as duas mãos, elevando o pé dele.","Gire o próprio corpo por baixo, alinhando a perna dele em posição de chave.","Prenda o pé junto ao peito, controlando o joelho com o antebraço.","Aplique a pressão de forma gradual, sempre atento à reação do parceiro."],"dicas":["Esse tipo de chave envolve maior risco — priorize sempre controle sobre velocidade.","Manter o joelho do oponente alinhado ao corpo evita rotações perigosas durante o treino."],"erros":["Girar o próprio corpo rápido demais, perdendo o alinhamento necessário.","Negligenciar o controle do joelho, aumentando o risco de lesão."]},{"id":"t085","videoSearch":"https://www.youtube.com/results?search_query=Transi%C3%A7%C3%A3o%20para%20Montada%20a%20partir%20do%20Controle%20Lateral%20bjj%20tecnica","nome":"Transição para Montada a partir do Controle Lateral","categoria":"Passagem de Guarda","faixa":"marrom","posicao":"Montada","objetivo":"Avançar do controle lateral diretamente para a posição montada, aproveitando a reação de defesa do oponente.","passos":["Do controle lateral, controle o pulso distante e a cabeça do oponente.","Ao sentir o oponente empurrar o quadril para criar espaço, as mangas e empurre com os pés, desequilibrando o oponente para o lado.","No momento da queda, gire o corpo acompanhando o movimento dele, em vez de subir por cima direto.","Continue o giro até alcançar as costas, mantendo o controle das mangas.","Insira os ganchos de costas assim que completar a rotação."],"dicas":["A decisão de ir para as costas, em vez de simplesmente subir por cima, deve ser tomada ainda durante a queda.","Manter o controle das mangas durante todo o giro evita que o oponente se defenda com os braços."],"erros":["Subir direto por cima em vez de aproveitar o giro para as costas.","Soltar as mangas no meio da rotação, perdendo o controle do oponente."]},{"id":"t088","videoSearch":"https://www.youtube.com/results?search_query=Chave%20de%20P%C3%A9%20do%20Joelho%20na%20Barriga%20(Toe%20Hold)%20bjj%20tecnica","nome":"Chave de Pé do Joelho na Barriga (Toe Hold)","categoria":"Finalização","faixa":"marrom","posicao":"Joelho na Barriga","objetivo":"Finalizar o pé do oponente aproveitando a perna que fica exposta durante a defesa do joelho na barriga.","passos":["Do joelho na barriga, se o oponente tentar empurrar o joelho com a mão, capture o pé da perna mais próxima.","Gire o corpo para alinhar o controle da perna dele junto ao seu quadril.","Segure o pé com as duas mãos, girando-o em direção à sola.","Aplique a pressão de forma gradual, torcendo o pé enquanto controla o joelho dele."],"dicas":["A oportunidade surge naturalmente quando o oponente tenta se defender empurrando com a perna.","Controlar o joelho do oponente evita que ele gire o corpo para aliviar a pressão."],"erros":["Girar o pé com força total de uma vez, sem dar tempo do parceiro reagir.","Perder o controle do joelho, permitindo que ele rode a perna inteira."]},{"id":"t089","videoSearch":"https://www.youtube.com/results?search_query=Berimbolo%20com%20Finaliza%C3%A7%C3%A3o%20em%20Twister%20bjj%20tecnica","nome":"Berimbolo com Finalização em Twister","categoria":"Finalização","faixa":"preta","posicao":"De La Riva","objetivo":"Encadear o berimbolo com o twister, combinando raspagem e finalização espinhal em sequência.","passos":["Execute o berimbolo completo até chegar à posição de costas com ganchos inseridos.","Ao sentir o oponente virar para a barriga, controle o quadril dele com um gancho de perna elevado.","Traga o braço por trás do pescoço e do braço distante do oponente, girando o tronco dele.","Combine a torção do tronco com a pressão do gancho de perna para aplicar a finalização."],"dicas":["A transição precisa ser fluida — qualquer pausa dá tempo do oponente se defender.","O controle do quadril com o gancho de perna é o que sustenta toda a sequência."],"erros":["Tentar aplicar a finalização sem antes garantir o controle do quadril do oponente.","Perder o ritmo entre o berimbolo e a transição para o twister."]},{"id":"t090","videoSearch":"https://www.youtube.com/results?search_query=Estrangulamento%20Von%20Flue%20Choke%20bjj%20tecnica","nome":"Estrangulamento Von Flue Choke","categoria":"Finalização","faixa":"preta","posicao":"Guarda Aberta","objetivo":"Estrangular o oponente que tenta a guilhotina contra você, usando o próprio peso do corpo.","passos":["Quando o oponente prender uma guilhotina com as pernas fechadas, controle o braço dele por dentro.","Passe por cima da cabeça dele, ajustando o quadril para o lado oposto do braço da guilhotina.","Pressione o ombro contra o pescoço dele, usando o peso do corpo, não a força dos braços.","Finalize a passagem estabilizando o controle lateral com a pressão do ombro fechando o pescoço."],"dicas":["É uma técnica de resposta — funciona melhor como contra-ataque a uma guilhotina malfeita.","O peso do corpo, aplicado com paciência, é mais eficiente que forçar com os braços."],"erros":["Tentar puxar a cabeça para fora em vez de usar o peso do corpo.","Girar para o lado errado, aliviando a pressão em vez de aumentá-la."]},{"id":"t091","videoSearch":"https://www.youtube.com/results?search_query=Passagem%20Long%20Step%20bjj%20tecnica","nome":"Passagem Long Step","categoria":"Passagem de Guarda","faixa":"preta","posicao":"Guarda Aberta","objetivo":"Passar guardas de gancho (como De La Riva) dando um passo longo para trás e por cima do gancho.","passos":["Sinta o oponente encaixar um gancho de guarda (De La Riva ou similar) na sua perna.","Dê um passo longo para trás com a perna presa, girando o corpo e libertando o gancho.","Continue o giro, trazendo o joelho de volta por cima da perna do oponente.","Estabilize o controle de quadril assim que ultrapassar o gancho."],"dicas":["O passo precisa ser longo o suficiente para tirar totalmente a perna do alcance do gancho.","Mantenha as mãos controlando a manga ou o quadril do oponente durante o passo."],"erros":["Dar um passo curto, deixando o gancho ainda alcançável pelo oponente.","Perder o controle das mãos durante o giro, permitindo reajuste do oponente."]},{"id":"t092","videoSearch":"https://www.youtube.com/results?search_query=Twister%20bjj%20tecnica","nome":"Twister","categoria":"Finalização","faixa":"preta","posicao":"Costas","objetivo":"Finalizar torcendo a coluna do oponente a partir do controle de costas com o quadril isolado.","passos":["A partir do controle de costas com um gancho de perna elevado, vire o oponente de barriga para baixo.","Isole o quadril dele com o gancho, impedindo que ele acompanhe o giro do tronco.","Passe o braço por trás do pescoço e puxe a cabeça em direção ao quadril isolado.","Aplique a torção de forma gradual, combinando o giro da cabeça com o isolamento do quadril."],"dicas":["O isolamento do quadril é o ponto-chave — sem ele, o oponente acompanha o giro e escapa.","Aplique com controle, dando tempo do parceiro bater ao sentir a torção."],"erros":["Girar a cabeça sem isolar o quadril, permitindo que o oponente gire o corpo todo junto.","Aplicar a pressão de forma brusca."]},{"id":"t093","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%20Waiter%20Sweep%20bjj%20tecnica","nome":"Raspagem Waiter Sweep","categoria":"Raspagem","faixa":"preta","posicao":"De La Riva","objetivo":"Raspar o oponente de pé usando o gancho de guarda como uma \"bandeja de garçom\" sob a perna dele.","passos":["Da guarda De La Riva, com o oponente de pé, controle a manga do lado do gancho.","Suba o gancho por baixo da coxa dele, como se erguesse uma bandeja.","Puxe a manga para baixo enquanto eleva o gancho, tirando o pé de apoio do oponente do chão.","Complete o giro para cima assim que ele perder a base."],"dicas":["A combinação de puxar a manga para baixo e erguer o gancho é o que gera o desequilíbrio.","Funciona melhor quando o oponente já está com o peso adiantado."],"erros":["Erguer o gancho sem puxar a manga, perdendo o desequilíbrio necessário.","Tentar a raspagem com o oponente ainda com peso bem distribuído nos dois pés."]},{"id":"t094","videoSearch":"https://www.youtube.com/results?search_query=Chave%20de%20Calcanhar%20Avan%C3%A7ada%20(Inside%20Heel%20Hook)%20bjj%20tecnica","nome":"Chave de Calcanhar Avançada (Inside Heel Hook)","categoria":"Finalização","faixa":"preta","posicao":"50/50","objetivo":"Finalizar o calcanhar a partir de um controle avançado de perna (leg entanglement), com ênfase em segurança.","passos":["A partir de um controle avançado de perna, isole o pé do oponente junto ao seu peito.","Controle o joelho dele com o antebraço para travar qualquer rotação da perna.","Ajuste o ângulo do próprio corpo para maximizar a alavanca sem depender de força excessiva.","Aplique a rotação de forma lenta e controlada, sempre atento ao sinal de batida do parceiro."],"dicas":["Por ser uma chave de alto risco, priorize sempre treinar a leveza da aplicação sobre a velocidade.","O controle do joelho é o que diferencia uma chave segura de uma perigosa."],"erros":["Aplicar rotação rápida demais, sem espaço para o parceiro reagir.","Negligenciar o controle do joelho, focando só no pé."]},{"id":"t095","videoSearch":"https://www.youtube.com/results?search_query=Armlock%20Invertido%20(Inverted%20Armbar)%20bjj%20tecnica","nome":"Armlock Invertido (Inverted Armbar)","categoria":"Finalização","faixa":"preta","posicao":"Costas","objetivo":"Finalizar o cotovelo do oponente a partir de uma posição invertida, geralmente durante transições de costas.","passos":["Em uma transição para as costas, controle um braço do oponente que ficou cruzado no corpo dele.","Gire seu corpo por baixo, invertendo a posição enquanto mantém o braço preso.","Trave o braço entre as pernas ou junto ao corpo, dependendo da variação.","Estenda o quadril para aplicar a pressão no cotovelo, ajustando o ângulo pela inversão."],"dicas":["A inversão exige controle constante do braço — perder a pegada durante o giro perde a finalização.","Pratique a transição devagar antes de aplicar em ritmo de treino livre."],"erros":["Perder o controle do braço durante a inversão do corpo.","Girar rápido demais sem estabilizar o ângulo de finalização."]},{"id":"t096","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%20Kiss%20of%20the%20Dragon%20bjj%20tecnica","nome":"Raspagem Kiss of the Dragon","categoria":"Raspagem","faixa":"preta","posicao":"De La Riva","objetivo":"Variação avançada de berimbolo que ataca diretamente o cinto/lapela do oponente durante o giro.","passos":["Inicie o giro de berimbolo a partir da guarda De La Riva, controlando a manga.","No meio do giro, prenda o cinto ou a lapela traseira do oponente com a mão livre.","Use essa pegada extra para acelerar a rotação e travar a reação de defesa dele.","Complete o giro chegando às costas com controle já estabelecido pela pegada no cinto."],"dicas":["A pegada extra no cinto reduz a chance do oponente girar junto e neutralizar o berimbolo.","Treine o tempo da pegada — ela deve ocorrer no auge do giro, não no início."],"erros":["Buscar a pegada no cinto cedo demais, atrapalhando o próprio giro.","Perder o gancho de De La Riva durante a busca da pegada extra."]},{"id":"t097","videoSearch":"https://www.youtube.com/results?search_query=Passagem%20Backstep%20bjj%20tecnica","nome":"Passagem Backstep","categoria":"Passagem de Guarda","faixa":"preta","posicao":"Guarda Aberta","objetivo":"Passar a guarda usando um passo curto e rápido para trás, tirando o quadril do alcance das pernas do oponente.","passos":["Com um underhook ou controle de manga estabelecido, gire o quadril rapidamente para trás.","Dê um passo curto com a perna mais próxima, saindo do alcance das pernas do oponente.","Continue o giro, trazendo o corpo para o lado das costas dele.","Consolide o controle de costas ou lateral assim que completar o passo."],"dicas":["A velocidade do giro é mais importante que a amplitude do passo.","Mantenha o controle da parte de cima do oponente durante todo o movimento para não perder o ângulo."],"erros":["Fazer o passo largo demais, perdendo o equilíbrio durante o giro.","Soltar o controle superior antes de completar a passagem."]},{"id":"t098","videoSearch":"https://www.youtube.com/results?search_query=Estrangulamento%20Mata-Le%C3%A3o%20com%20Queda%20de%20Corpo%20(Slack%20Choke)%20bjj%20tecnica","nome":"Estrangulamento Mata-Leão com Queda de Corpo (Slack Choke)","categoria":"Finalização","faixa":"preta","posicao":"Costas","objetivo":"Finalizar o mata-leão mesmo com uma pegada inicial solta, usando o peso do corpo para fechar a chave.","passos":["Com o mata-leão parcialmente encaixado, mas a pegada ainda solta, mantenha o controle das costas.","Em vez de forçar os braços, deixe o peso do corpo cair para trás, esticando o pescoço do oponente.","Ajuste a pegada gradualmente conforme o oponente perde a base para se defender.","Feche o estrangulamento final apertando os braços apenas quando a pegada já estiver segura."],"dicas":["A paciência é a chave — forçar uma pegada solta cedo demais costuma fazer perder a posição.","Use o peso do corpo, não a força dos braços, para desgastar a defesa do oponente."],"erros":["Forçar o fechamento da chave com a pegada ainda solta, alertando o oponente para se defender.","Perder o controle das costas ao tentar ajustar a pegada."]},{"id":"t099","videoSearch":"https://www.youtube.com/results?search_query=Kimura%20Invertida%20pelas%20Costas%20(Inverted%20Kimura%20from%20Back)%20bjj%20tecnica","nome":"Kimura Invertida pelas Costas (Inverted Kimura from Back)","categoria":"Finalização","faixa":"preta","posicao":"Costas","objetivo":"Aplicar a kimura a partir de um ângulo invertido durante transições do controle de costas.","passos":["Durante uma transição em que o oponente gira para escapar do controle de costas, capture o pulso do braço mais próximo.","Gire o próprio corpo junto com o movimento dele, invertendo a posição sem perder a pegada.","Trave a chave passando o braço por baixo do cotovelo dele, adaptando o ângulo à inversão.","Gire o punho em direção às costas dele, ajustando a direção da torção conforme o ângulo invertido."],"dicas":["A chave acompanha o movimento do oponente em vez de resistir a ele — use a energia da fuga dele a seu favor.","Pratique a transição isoladamente antes de aplicar em ritmo de treino livre."],"erros":["Resistir ao giro do oponente em vez de acompanhá-lo, perdendo a pegada.","Perder o alinhamento do cotovelo durante a inversão do corpo."]},{"id":"t100","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%20Tornado%20Avan%C3%A7ada%20(com%20Finaliza%C3%A7%C3%A3o%20em%20Tri%C3%A2ngulo)%20bjj%20tecnica","nome":"Raspagem Tornado Avançada (com Finalização em Triângulo)","categoria":"Raspagem","faixa":"preta","posicao":"De La Riva","objetivo":"Encadear a raspagem tornado com uma tentativa de triângulo caso o oponente resista à inversão.","passos":["Inicie a raspagem tornado a partir da guarda De La Riva, invertendo o corpo.","Caso o oponente resista e mantenha a postura, aproveite o braço exposto dele para armar um triângulo.","Ajuste o ângulo do quadril para debaixo do braço livre dele, mesmo na posição invertida.","Finalize o triângulo ou continue a inversão para as costas, dependendo da reação do oponente."],"dicas":["Ter duas opções (raspagem ou triângulo) a partir do mesmo movimento aumenta a eficácia do ataque.","Observe a reação do oponente para decidir qual das duas finalizações seguir."],"erros":["Insistir na raspagem mesmo quando o oponente já expôs o braço para o triângulo.","Perder o gancho de guarda ao tentar decidir entre as duas opções."]},{"id":"t101","videoSearch":"https://www.youtube.com/results?search_query=Chave%20de%20Calcanhar%20Externa%20(Outside%20Heel%20Hook)%20bjj%20tecnica","nome":"Chave de Calcanhar Externa (Outside Heel Hook)","categoria":"Finalização","faixa":"preta","posicao":"50/50","objetivo":"Finalizar o calcanhar do oponente a partir de um controle externo de perna, com ênfase máxima em segurança.","passos":["A partir de um controle avançado de perna pelo lado externo, isole o pé do oponente junto ao seu quadril.","Controle o joelho dele com o braço para travar qualquer rotação da perna.","Ajuste o ângulo do próprio corpo para a linha de alavanca externa, distinta da variação interna.","Aplique a rotação de forma extremamente gradual, priorizando sempre a segurança do parceiro."],"dicas":["É uma das finalizações de maior risco do jiu-jítsu — a prioridade número um é sempre a segurança, nunca a velocidade.","Treine exclusivamente sob supervisão de um professor experiente nessa categoria de chave."],"erros":["Aplicar qualquer velocidade ou explosão na rotação.","Negligenciar o controle do joelho, focando apenas no pé."]},{"id":"t102","videoSearch":"https://www.youtube.com/results?search_query=Passagem%20com%20Press%C3%A3o%20de%20Cabe%C3%A7a%20(Cross-Face%20Pass)%20bjj%20tecnica","nome":"Passagem com Pressão de Cabeça (Cross-Face Pass)","categoria":"Passagem de Guarda","faixa":"preta","posicao":"Controle Lateral","objetivo":"Passar a guarda controlando a cabeça do oponente com o antebraço para impedir que ele gire o corpo.","passos":["Do controle lateral ou joelho na barriga, passe o antebraço por trás da cabeça do oponente, cruzando o rosto dele.","Pressione a cabeça dele contra o chão, limitando a rotação do tronco.","Use a outra mão para controlar o quadril ou a perna distante.","Avance o corpo para o lado controlado, consolidando a passagem com a cabeça já neutralizada."],"dicas":["A pressão na cabeça impede que o oponente \"esconda\" o quadril, uma das principais defesas de passagem.","Sincronize a pressão de cabeça com o avanço do quadril para não perder tempo na posição."],"erros":["Pressionar a cabeça sem avançar o restante do corpo, perdendo a oportunidade de consolidar.","Colocar peso excessivo no pescoço em vez de distribuir a pressão de forma controlada."]},{"id":"t103","videoSearch":"https://www.youtube.com/results?search_query=Estrangulamento%20do%20Crucifixo%20(Crucifix%20Choke)%20bjj%20tecnica","nome":"Estrangulamento do Crucifixo (Crucifix Choke)","categoria":"Finalização","faixa":"preta","posicao":"Turtle","objetivo":"Finalizar o oponente a partir da imobilização do crucifixo, com um estrangulamento combinado à trava dos braços.","passos":["A partir do crucifixo, com os dois braços do oponente já imobilizados, passe a perna de trás pelo pescoço dele.","Ajuste o triângulo de pernas ao redor do pescoço, mantendo os braços dele presos.","Use a mão livre para reforçar a pressão ou ajustar a gola, se disponível.","Feche a pressão das pernas enquanto mantém a imobilização dos braços, fechando o estrangulamento."],"dicas":["A força dessa finalização vem da combinação entre a imobilização dos braços e a pressão das pernas.","Ajuste a posição lentamente — perder a trava de um dos braços permite a defesa do oponente."],"erros":["Focar só na perna do estrangulamento e perder a trava de um dos braços.","Aplicar pressão sem ajustar bem o triângulo de pernas primeiro."]},{"id":"t104","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%2050%2F50%20com%20Berimbolo%20bjj%20tecnica","nome":"Raspagem 50/50 com Berimbolo","categoria":"Raspagem","faixa":"preta","posicao":"50/50","objetivo":"Combinar a mecânica do berimbolo com a posição 50/50 para chegar às costas do oponente.","passos":["No 50/50, controle a manga do oponente do lado oposto ao gancho.","Gire o corpo por baixo, como no berimbolo, mantendo o gancho de perna do 50/50 ativo.","Continue o giro passando de um lado para o outro do oponente.","Finalize a rotação chegando às costas, inserindo os ganchos imediatamente."],"dicas":["A mecânica de giro é semelhante ao berimbolo tradicional, mas adaptada à trava de pernas do 50/50.","Priorize sempre inserir os ganchos de costas assim que completar o giro."],"erros":["Perder o gancho do 50/50 no meio do giro, permitindo que o oponente se solte.","Demorar para inserir os ganchos de costas ao final da rotação."]},{"id":"t105","videoSearch":"https://www.youtube.com/results?search_query=Passagem%20Direta%20do%20Joelho%20na%20Barriga%20para%20a%20Montada%20bjj%20tecnica","nome":"Passagem Direta do Joelho na Barriga para a Montada","categoria":"Passagem de Guarda","faixa":"preta","posicao":"Joelho na Barriga","objetivo":"Transicionar rapidamente do joelho na barriga para a montada, aproveitando o desconforto da posição.","passos":["Do joelho na barriga, mantenha uma pressão constante e desconfortável sobre o abdômen do oponente.","No instante em que ele tentar empurrar o joelho com as duas mãos, solte o controle do pulso.","Aproveite o espaço criado pela própria defesa dele para deslizar a perna por cima, alcançando a montada.","Estabilize o peso centralizado assim que completar a transição."],"dicas":["A pressão constante é o que gera a reação de defesa que abre espaço para a transição.","O momento certo de soltar o pulso é logo quando ele começa a empurrar com as duas mãos."],"erros":["Soltar o pulso cedo demais, antes do oponente reagir com a defesa.","Perder a pressão do joelho antes de completar a transição."]},{"id":"t106","videoSearch":"https://www.youtube.com/results?search_query=Twister%20Side%20Control%20(Twister%20do%20Controle%20Lateral)%20bjj%20tecnica","nome":"Twister Side Control (Twister do Controle Lateral)","categoria":"Finalização","faixa":"preta","posicao":"Controle Lateral","objetivo":"Iniciar a mecânica do twister a partir do controle lateral, sem depender do controle de costas tradicional.","passos":["Do controle lateral, vire o oponente de barriga para baixo, mantendo a pressão do peito.","Isole o quadril dele com uma perna elevada, impedindo que ele acompanhe o giro do tronco.","Passe o braço por trás do pescoço e do braço distante do oponente.","Combine a torção da cabeça com o isolamento do quadril para aplicar a pressão na coluna."],"dicas":["Iniciar a partir do controle lateral exige um bom timing para virar o oponente sem perder a posição.","O isolamento do quadril continua sendo o ponto-chave, igual na versão tradicional do twister."],"erros":["Tentar virar o oponente sem manter a pressão do peito, permitindo que ele escape.","Perder o isolamento do quadril durante a virada."]},{"id":"t107","videoSearch":"https://www.youtube.com/results?search_query=Kimura%20Invertida%20da%20Guarda%20Lasso%20bjj%20tecnica","nome":"Kimura Invertida da Guarda Lasso","categoria":"Finalização","faixa":"preta","posicao":"Lasso Guard","objetivo":"Aplicar a kimura em um ângulo invertido, aproveitando a trava da guarda lasso durante transições.","passos":["Da guarda lasso, durante uma tentativa de passagem do oponente, capture o pulso do braço mais próximo.","Gire o próprio corpo por baixo, invertendo a posição enquanto mantém a manga enrolada.","Trave a chave adaptando o ângulo do cotovelo à posição invertida.","Gire o punho dele, ajustando a direção da torção conforme o ângulo do corpo."],"dicas":["A trava do lasso na manga ajuda a manter o controle do braço mesmo durante a inversão.","Pratique a transição isoladamente antes de aplicar em ritmo de treino livre."],"erros":["Perder o enrolamento do lasso durante o giro invertido.","Perder o alinhamento do cotovelo ao adaptar o ângulo da chave."]},{"id":"t108","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%20Spider-Lasso%20Combinada%20bjj%20tecnica","nome":"Raspagem Spider-Lasso Combinada","categoria":"Raspagem","faixa":"preta","posicao":"Spider Guard","objetivo":"Combinar os controles de guarda aranha e guarda lasso na mesma raspagem, multiplicando as opções de ataque.","passos":["Estabeleça a guarda aranha em um braço e a guarda lasso na perna do mesmo lado.","Use o pé livre no quadril do oponente para controlar a distância.","Puxe a manga presa pela aranha enquanto desenrola o lasso na direção do giro.","Combine os dois movimentos para desequilibrar e completar a raspagem."],"dicas":["Ter duas travas simultâneas (aranha e lasso) multiplica as reações possíveis do oponente e suas próprias opções.","Pratique cada trava isoladamente antes de tentar combiná-las."],"erros":["Tentar manter as duas travas com força igual, sem definir qual está gerando o desequilíbrio principal.","Perder uma das travas ao focar demais na outra."]},{"id":"t109","videoSearch":"https://www.youtube.com/results?search_query=Passagem%20Long%20Step%20do%2050%2F50%20bjj%20tecnica","nome":"Passagem Long Step do 50/50","categoria":"Passagem de Guarda","faixa":"preta","posicao":"50/50","objetivo":"Sair da posição 50/50 usando um passo longo, retirando a perna do alcance do gancho do oponente.","passos":["No 50/50, controle a manga ou o pulso do oponente do lado livre.","Dê um passo longo para trás com a perna presa, girando o quadril para fora do gancho.","Continue o giro, trazendo o joelho de volta por cima da perna dele.","Estabilize o controle de perna ou lateral assim que ultrapassar o gancho."],"dicas":["O passo precisa ser longo o suficiente para realmente sair do alcance do gancho de pernas.","Manter o controle superior durante o passo evita que o oponente ataque durante a saída."],"erros":["Dar um passo curto, permanecendo ao alcance do gancho do oponente.","Soltar o controle superior durante a execução do passo."]},{"id":"t110","videoSearch":"https://www.youtube.com/results?search_query=Chave%20de%20Calcanhar%20da%20Meia-Guarda%20Profunda%20bjj%20tecnica","nome":"Chave de Calcanhar da Meia-Guarda Profunda","categoria":"Finalização","faixa":"preta","posicao":"Meia-Guarda","objetivo":"Finalizar o calcanhar do oponente a partir de um controle de perna avançado dentro da meia-guarda profunda.","passos":["Da meia-guarda profunda, controle o pé da perna de apoio do oponente, expondo o calcanhar.","Trave o pé junto ao próprio peito, sem deixar espaço para giro.","Controle o joelho dele com a outra mão, impedindo qualquer rotação.","Gire o corpo lentamente, aplicando a torção rotacional no calcanhar de forma extremamente gradual."],"dicas":["É uma finalização de altíssimo risco — a prioridade máxima é sempre a segurança do parceiro de treino.","A profundidade da meia-guarda facilita o controle do pé, mas exige ainda mais atenção ao joelho."],"erros":["Aplicar qualquer velocidade na torção.","Negligenciar o controle do joelho, mesmo com o pé bem preso."]},{"id":"t111","videoSearch":"https://www.youtube.com/results?search_query=Osoto%20Gari%20bjj%20tecnica","nome":"Osoto Gari","categoria":"Queda","faixa":"branca","posicao":"Em Pé","objetivo":"Derrubar o oponente varrendo a perna de apoio dele por trás, com a perna esticada.","passos":["Quebre o equilíbrio do oponente para trás e para o lado, puxando gola e manga.","Dê um passo entrando profundamente ao lado do corpo dele.","Varra a perna de apoio dele com sua perna esticada, de trás para frente.","Empurre o tronco dele para trás enquanto a perna é varrida, completando a queda."],"dicas":["Quebrar o equilíbrio antes de entrar é essencial — sem isso, o oponente resiste com facilidade.","A perna que varre deve ficar esticada, funcionando como uma foice."],"erros":["Entrar sem quebrar o equilíbrio do oponente primeiro.","Dobrar o joelho da perna que varre, perdendo alcance e força."]},{"id":"t112","videoSearch":"https://www.youtube.com/results?search_query=Ouchi%20Gari%20bjj%20tecnica","nome":"Ouchi Gari","categoria":"Queda","faixa":"branca","posicao":"Em Pé","objetivo":"Derrubar o oponente enganchando a perna interna dele por trás do joelho.","passos":["Aproxime-se do oponente controlando gola e manga, quadril colado ao dele.","Passe sua perna por dentro, enganchando atrás do joelho da perna de apoio dele.","Puxe com o gancho enquanto empurra o tronco dele para trás com os braços.","Complete a queda mantendo o controle da parte de cima do corpo."],"dicas":["O gancho da perna e o empurrão do tronco devem acontecer ao mesmo tempo.","Mantenha o quadril colado ao do oponente para não perder a base durante o gancho."],"erros":["Enganchar a perna sem empurrar o tronco, o que só desequilibra parcialmente.","Afastar o quadril do oponente, perdendo a base do próprio movimento."]},{"id":"t113","videoSearch":"https://www.youtube.com/results?search_query=Kouchi%20Gari%20bjj%20tecnica","nome":"Kouchi Gari","categoria":"Queda","faixa":"azul","posicao":"Em Pé","objetivo":"Derrubar o oponente enganchando o calcanhar da perna de trás dele com um movimento curto e rápido.","passos":["Controle gola e manga, avançando um passo em diagonal.","Engancha o pé no calcanhar da perna de apoio traseira do oponente.","Puxe o pé dele para cima e para o lado, enquanto empurra o tronco na direção oposta.","Finalize a queda controlando a manga para manter vantagem no chão."],"dicas":["É um movimento curto e rápido — não precisa de grande amplitude de perna.","Funciona bem como combinação após uma finta de Osoto Gari."],"erros":["Fazer um gancho muito amplo, perdendo a velocidade característica do movimento.","Não empurrar o tronco na direção oposta ao gancho."]},{"id":"t114","videoSearch":"https://www.youtube.com/results?search_query=Seoi%20Nage%20bjj%20tecnica","nome":"Seoi Nage","categoria":"Queda","faixa":"azul","posicao":"Em Pé","objetivo":"Projetar o oponente por cima do ombro, usando o quadril como ponto de apoio.","passos":["Controle a manga e a gola do oponente, puxando-o para frente.","Gire de costas para ele, encaixando o quadril abaixo do centro de gravidade dele.","Dobre os joelhos para abaixar o quadril e prenda o braço dele sobre o ombro.","Estenda as pernas e incline o tronco para frente, projetando-o por cima do ombro."],"dicas":["Encaixar o quadril abaixo do centro de gravidade do oponente é o que permite a projeção.","A força vem da extensão das pernas, não apenas do tronco."],"erros":["Girar sem abaixar o quadril, ficando alto demais para projetar.","Puxar só com os braços, sem usar as pernas para gerar força."]},{"id":"t115","videoSearch":"https://www.youtube.com/results?search_query=Tai%20Otoshi%20bjj%20tecnica","nome":"Tai Otoshi","categoria":"Queda","faixa":"roxa","posicao":"Em Pé","objetivo":"Derrubar o oponente bloqueando a perna dele com a sua enquanto gira o tronco.","passos":["Controle manga e gola, puxando o oponente em diagonal para quebrar o equilíbrio.","Gire o corpo, colocando a perna esticada como uma barreira à frente da perna dele.","Continue girando o tronco, usando a barreira da perna como eixo.","Complete a projeção puxando com os braços por cima da barreira formada pela perna."],"dicas":["A perna que bloqueia deve ficar firme, funcionando como um obstáculo fixo.","O giro do tronco é o que realmente gera a queda, a perna apenas trava o movimento dele."],"erros":["Posicionar a perna de bloqueio tarde demais, depois que o oponente já reagiu.","Girar o tronco sem quebrar o equilíbrio antes, permitindo que o oponente rebalanceie."]},{"id":"t116","videoSearch":"https://www.youtube.com/results?search_query=Ippon%20Seoi%20Nage%20bjj%20tecnica","nome":"Ippon Seoi Nage","categoria":"Queda","faixa":"roxa","posicao":"Em Pé","objetivo":"Projetar o oponente segurando apenas um braço dele por cima do ombro.","passos":["Controle um pulso do oponente com as duas mãos, puxando-o para frente.","Gire de costas para ele, passando o braço por baixo da axila do braço controlado.","Abaixe o quadril, prendendo o braço dele firmemente sobre o próprio ombro.","Estenda as pernas e incline o tronco, projetando-o por cima do ombro."],"dicas":["Prender bem a axila do oponente sobre o ombro é o que diferencia essa variação da Seoi Nage tradicional.","Mantenha o cotovelo do braço controlado colado ao seu corpo durante o giro."],"erros":["Deixar espaço entre o braço do oponente e o próprio ombro, perdendo a trava.","Ficar em pé demais, sem abaixar o quadril para gerar alavanca."]},{"id":"t117","videoSearch":"https://www.youtube.com/results?search_query=Kata%20Guruma%20(Fireman's%20Carry)%20bjj%20tecnica","nome":"Kata Guruma (Fireman's Carry)","categoria":"Queda","faixa":"marrom","posicao":"Em Pé","objetivo":"Erguer o oponente sobre os ombros, como um carregamento de bombeiro, e girá-lo para a queda.","passos":["Abaixe o nível do corpo, passando um braço entre as pernas do oponente.","Com o outro braço, controle o braço ou ombro dele por cima.","Erga o oponente sobre os ombros, usando a força das pernas para levantar.","Gire o tronco e abaixe o oponente controladamente para o chão, controlando a queda."],"dicas":["A força de levantar vem das pernas, nunca das costas.","Mantenha o oponente centralizado sobre os ombros para não perder o equilíbrio durante o giro."],"erros":["Tentar erguer usando apenas as costas, o que gera risco de lesão para quem aplica.","Girar rápido demais sem controlar a descida do oponente."]},{"id":"t118","videoSearch":"https://www.youtube.com/results?search_query=Sumi%20Gaeshi%20bjj%20tecnica","nome":"Sumi Gaeshi","categoria":"Queda","faixa":"marrom","posicao":"Em Pé","objetivo":"Derrubar o oponente para trás usando uma raspagem de queda, puxando-o por cima do próprio corpo.","passos":["Controle a gola e a manga do oponente, aproximando o quadril do dele.","Coloque um pé no baixo-ventre ou coxa dele, criando um ponto de apoio.","Deixe-se cair para trás, puxando-o com as mãos e empurrando com o pé de apoio.","Continue o movimento até ficar por cima ao final da queda."],"dicas":["A queda controlada para trás é o que gera a força da raspagem — não é um movimento passivo.","Manter o pé de apoio ativo durante toda a queda evita que o oponente escape lateralmente."],"erros":["Cair para trás sem manter o ponto de apoio do pé, perdendo o controle da direção.","Soltar a pegada de gola e manga antes de completar o giro final."]},{"id":"t119","videoSearch":"https://www.youtube.com/results?search_query=Harai%20Goshi%20bjj%20tecnica","nome":"Harai Goshi","categoria":"Queda","faixa":"preta","posicao":"Em Pé","objetivo":"Projetar o oponente varrendo a perna dele com a própria coxa, em um movimento de quadril e perna combinado.","passos":["Controle gola e manga, puxando o oponente para quebrar o equilíbrio para frente.","Gire de costas para ele, encaixando o quadril abaixo do centro de gravidade dele.","Eleve uma perna esticada, varrendo a perna dele de trás para frente, na altura da coxa.","Combine a varredura da perna com a extensão do tronco para completar a projeção."],"dicas":["A combinação do encaixe de quadril com a varredura da perna é o que diferencia esse arremesso de um simples empurrão.","O momento da varredura deve coincidir com o pico da quebra de equilíbrio do oponente."],"erros":["Varrer a perna sem antes encaixar bem o quadril, perdendo potência.","Fazer o movimento fora do tempo da quebra de equilíbrio do oponente."]},{"id":"t120","videoSearch":"https://www.youtube.com/results?search_query=Sumi%20Otoshi%20bjj%20tecnica","nome":"Sumi Otoshi","categoria":"Queda","faixa":"branca","posicao":"Em Pé","objetivo":"Derrubar o oponente para trás com um desequilíbrio direto, sem enganchar as pernas.","passos":["Controle gola e manga, puxando o oponente diagonalmente para quebrar o equilíbrio para trás.","Dê um passo grande para o lado, posicionando o próprio corpo perpendicular ao dele.","Continue a puxada dos braços, guiando o corpo do oponente para trás sem apoio de perna.","Complete a queda mantendo o controle da gola e da manga até o chão."],"dicas":["Como não há gancho de perna, o desequilíbrio inicial precisa ser bem mais forte e preciso.","O passo lateral é o que cria o ângulo necessário para a queda."],"erros":["Tentar a queda sem desequilibrar o suficiente o oponente antes.","Ficar de frente para ele, sem buscar o ângulo perpendicular."]},{"id":"t121","videoSearch":"https://www.youtube.com/results?search_query=Tomoe%20Nage%20(Queda%20de%20Sacrif%C3%ADcio)%20bjj%20tecnica","nome":"Tomoe Nage (Queda de Sacrifício)","categoria":"Queda","faixa":"azul","posicao":"Em Pé","objetivo":"Projetar o oponente para trás sobre o próprio corpo, usando um pé no abdômen dele como alavanca.","passos":["Controle gola e manga, puxando o oponente para frente enquanto você se deixa cair de costas.","Coloque um pé no baixo-ventre do oponente no momento da queda.","Puxe com as mãos e empurre com o pé simultaneamente, usando o próprio corpo como eixo.","Continue o movimento até ficar por cima ao final da projeção."],"dicas":["É uma queda de sacrifício — pratique primeiro a queda controlada antes de aplicar em ritmo de treino livre.","A sincronia entre puxar com as mãos e empurrar com o pé é o que gera a projeção."],"erros":["Empurrar com o pé sem puxar com as mãos, o que só afasta o oponente sem derrubá-lo.","Cair sem controle, perdendo a chance de ficar por cima ao final."]},{"id":"t122","videoSearch":"https://www.youtube.com/results?search_query=Uchi%20Mata%20bjj%20tecnica","nome":"Uchi Mata","categoria":"Queda","faixa":"roxa","posicao":"Em Pé","objetivo":"Projetar o oponente elevando a perna por dentro da coxa dele, tirando a base de apoio.","passos":["Controle gola e manga, puxando o oponente para quebrar o equilíbrio para frente e para o lado.","Gire de costas para ele, encaixando o quadril profundamente junto ao dele.","Eleve uma perna por dentro da coxa do oponente, na direção da virilha dele.","Combine a elevação da perna com a inclinação do tronco para completar a projeção."],"dicas":["A profundidade do encaixe de quadril é o que diferencia um Uchi Mata forte de um fraco.","A perna que eleva deve subir em linha ascendente, não apenas para o lado."],"erros":["Encaixar o quadril de forma rasa, perdendo a base para elevar a perna.","Elevar a perna para o lado em vez de para cima, reduzindo a eficácia da projeção."]},{"id":"t123","videoSearch":"https://www.youtube.com/results?search_query=Sode%20Tsurikomi%20Goshi%20bjj%20tecnica","nome":"Sode Tsurikomi Goshi","categoria":"Queda","faixa":"roxa","posicao":"Em Pé","objetivo":"Projetar o oponente por cima do quadril controlando apenas a manga, sem pegada na gola.","passos":["Controle as duas mangas do oponente, puxando-o para frente e para baixo.","Gire de costas para ele, encaixando o quadril abaixo do centro de gravidade dele.","Eleve as mangas controladas para cima enquanto abaixa o próprio quadril.","Estenda as pernas e incline o tronco para frente, projetando-o por cima do quadril."],"dicas":["Sem a pegada na gola, a elevação das mangas precisa ser mais forte e coordenada com as pernas.","Mantenha os cotovelos próximos ao corpo para não perder o controle das mangas durante o giro."],"erros":["Depender só da força dos braços para elevar, sem usar a extensão das pernas.","Girar sem abaixar o quadril antes, ficando muito alto para projetar."]},{"id":"t124","videoSearch":"https://www.youtube.com/results?search_query=Ko%20Soto%20Gake%20bjj%20tecnica","nome":"Ko Soto Gake","categoria":"Queda","faixa":"marrom","posicao":"Em Pé","objetivo":"Derrubar o oponente enganchando a perna de apoio traseira dele por fora, próximo ao calcanhar.","passos":["Controle gola e manga, avançando um passo para quebrar o equilíbrio do oponente para trás.","Engancha o próprio pé por fora, no calcanhar da perna de apoio traseira dele.","Empurre o tronco dele para trás com as mãos enquanto trava o gancho no calcanhar.","Complete a queda mantendo o controle da manga até o chão."],"dicas":["Funciona melhor como resposta a um oponente que recua o peso para trás.","O empurrão do tronco e o gancho no calcanhar devem ocorrer no mesmo instante."],"erros":["Enganchar o calcanhar sem empurrar o tronco, o que só desequilibra parcialmente.","Tentar a queda com o peso do oponente ainda centrado nos dois pés."]},{"id":"t125","videoSearch":"https://www.youtube.com/results?search_query=Drop%20Seoi%20Nage%20bjj%20tecnica","nome":"Drop Seoi Nage","categoria":"Queda","faixa":"preta","posicao":"Em Pé","objetivo":"Projetar o oponente por cima do ombro descendo o próprio corpo diretamente ao chão, sem passo intermediário.","passos":["Controle a manga e, se possível, a gola ou o pulso do oponente.","Ao invés de girar de pé, desça o próprio corpo diretamente para o chão, passando por baixo do braço dele.","Prenda o braço controlado sobre o ombro no momento em que os joelhos tocam o chão.","Estenda o tronco para frente, projetando o oponente por cima do ombro enquanto você já está embaixo."],"dicas":["A queda direta ao chão exige treino de quedas (ukemi) prévio para ser feita com segurança.","É mais rápida que o Seoi Nage tradicional, mas exige mais precisão no tempo de entrada."],"erros":["Descer ao chão sem antes garantir o controle firme do braço do oponente.","Perder o alinhamento do ombro no momento da descida, reduzindo a força da projeção."]},{"id":"t126","videoSearch":"https://www.youtube.com/results?search_query=Sasae%20Tsurikomi%20Ashi%20bjj%20tecnica","nome":"Sasae Tsurikomi Ashi","categoria":"Queda","faixa":"branca","posicao":"Em Pé","objetivo":"Derrubar o oponente bloqueando o tornozelo da perna de apoio dele com o próprio pé.","passos":["Controle gola e manga, puxando o oponente para quebrar o equilíbrio para frente e para o lado.","Coloque o próprio pé travando o tornozelo da perna de apoio dele, sem transferir peso para essa perna.","Puxe com as mãos guiando o corpo dele por cima do pé que bloqueia.","Complete a queda mantendo o controle da manga até o chão."],"dicas":["O pé de bloqueio deve tocar o tornozelo no momento exato em que o oponente transfere o peso para aquela perna.","A puxada das mãos é o que realmente gera a queda — o pé apenas trava o movimento."],"erros":["Colocar o pé de bloqueio tarde demais, depois que o oponente já ajustou o equilíbrio.","Transferir peso para o pé de bloqueio, perdendo a própria base."]},{"id":"t127","videoSearch":"https://www.youtube.com/results?search_query=Yoko%20Otoshi%20bjj%20tecnica","nome":"Yoko Otoshi","categoria":"Queda","faixa":"azul","posicao":"Em Pé","objetivo":"Derrubar o oponente para o lado, sacrificando a própria base em um ângulo lateral.","passos":["Controle gola e manga, puxando o oponente para o lado enquanto avança um passo cruzado.","Deixe as próprias pernas cruzarem, iniciando uma queda controlada para o lado.","Puxe o oponente na mesma direção da queda, guiando o corpo dele para baixo.","Complete a projeção mantendo o controle da manga até finalizar por cima."],"dicas":["O cruzamento das pernas deve ser proposital, não um erro de base.","A direção da puxada dos braços precisa coincidir exatamente com a direção da própria queda."],"erros":["Cruzar as pernas sem controlar a direção da queda, perdendo a projeção.","Puxar o oponente para uma direção diferente da própria queda, anulando o efeito."]},{"id":"t128","videoSearch":"https://www.youtube.com/results?search_query=Tani%20Otoshi%20(Valley%20Drop)%20bjj%20tecnica","nome":"Tani Otoshi (Valley Drop)","categoria":"Queda","faixa":"roxa","posicao":"Em Pé","objetivo":"Derrubar o oponente para trás bloqueando a perna dele enquanto se joga de lado.","passos":["Controle a cintura ou a gola do oponente, aproximando o corpo dele ao seu.","Passe uma perna por trás da perna de apoio dele, bloqueando-a.","Deixe o próprio corpo cair de lado, levando o oponente por cima da perna bloqueada.","Controle a queda para finalizar por cima ao final da projeção."],"dicas":["O bloqueio da pern // ===== dados =====
const BELT_LABELS = { branca:'Branca', azul:'Azul', roxa:'Roxa', marrom:'Marrom', preta:'Preta' };
const BELTS = ['branca','azul','roxa','marrom','preta'];
const CATEGORIES = ['Finalização','Raspagem','Passagem de Guarda','Queda'];
const POSITIONS = ['Guarda Fechada','Guarda Aberta','Meia-Guarda','Montada','Costas','Controle Lateral','Norte-Sul','Joelho na Barriga','Turtle','De La Riva','Spider Guard','Lasso Guard','50/50','Em Pé'];

// ===== estado (persistido no localStorage do navegador) =====
const STORAGE_KEY = 'jiuhub:v1';
function loadState() {
  const def = { profile:{ nome:'', nomeGuerra:'', faixa:'branca' }, favorites:[], studied:[], checkins:[] };
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return def;
    const parsed = JSON.parse(raw);
    return { ...def, ...parsed, profile: { ...def.profile, ...(parsed.profile||{}) } };
  } catch (e) { return def; }
}
let state = loadState();
function persist() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

let currentTab = 'lib';
let libFilters = { query:'', categoria:null, faixa:null, posicao:null, onlyFav:false, onlyStudied:false };
let openFilterPanel = null; // null | 'faixa' | 'categoria' | 'posicao'
let selectedTechnique = null;
let showTerms = false;
let editingProfile = !state.profile.nome;
let checkinCursor = (() => { const d = new Date(); return { year:d.getFullYear(), month:d.getMonth() }; })();

const root = document.getElementById('root');

function render() {
  root.innerHTML = `
    <div id="pane"></div>
    <nav class="bottom-nav">
      <button class="nav-item ${currentTab==='lib'?'active':''}" data-tab="lib">${iconBook()}<span>Técnicas</span></button>
      <button class="nav-item ${currentTab==='checkin'?'active':''}" data-tab="checkin">${iconFist()}<span>Check-in</span></button>
      <button class="nav-item ${currentTab==='regras'?'active':''}" data-tab="regras">${iconGavel()}<span>Regras</span></button>
      <button class="nav-item ${currentTab==='perfil'?'active':''}" data-tab="perfil">${iconUser()}<span>Perfil</span></button>
    </nav>
  `;
  root.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => { currentTab = btn.dataset.tab; render(); });
  });
  const pane = document.getElementById('pane');
  if (currentTab === 'lib') pane.innerHTML = renderLibrary();
  if (currentTab === 'checkin') pane.innerHTML = renderCheckin();
  if (currentTab === 'regras') pane.innerHTML = renderRegras();
  if (currentTab === 'perfil') pane.innerHTML = renderProfile();
  bindPaneEvents();
  if (selectedTechnique) renderModal();
  if (showTerms) renderTerms();
}

function iconFist() { return `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M7 10V7.5a1.5 1.5 0 0 1 3 0M10 10V6.5a1.5 1.5 0 0 1 3 0M13 10V7a1.5 1.5 0 0 1 3 0v3M16 10.2a1.3 1.3 0 0 1 2.6 0V14a5 5 0 0 1-5 5h-2a5 5 0 0 1-4.5-2.8L5 12.8c-.4-.8 0-1.7.8-2a1.3 1.3 0 0 1 1.6.6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>`; }
function iconUser() { return `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.5" stroke="currentColor" stroke-width="1.7"/><path d="M4.5 20c1.2-3.6 4-5.5 7.5-5.5s6.3 1.9 7.5 5.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>`; }
function iconGavel() { return `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="m14.5 4.5 5 5M3 21h9M8.5 8.5l-5 5 3 3 5-5M13 6l5 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>`; }

function beltStripes(segments, filled) {
  let html = '<div class="belt-stripes">';
  for (let i=0;i<segments;i++) html += `<div class="seg ${i<filled?'filled':''}"></div>`;
  return html + '</div>';
}

// ===== Biblioteca =====
function filterTechniques() {
  return TECHNIQUES.filter(t => {
    if (libFilters.query && !t.nome.toLowerCase().includes(libFilters.query.toLowerCase())) return false;
    if (libFilters.categoria && t.categoria !== libFilters.categoria) return false;
    if (libFilters.faixa && t.faixa !== libFilters.faixa) return false;
    if (libFilters.posicao && t.posicao !== libFilters.posicao) return false;
    if (libFilters.onlyFav && !state.favorites.includes(t.id)) return false;
    if (libFilters.onlyStudied && !state.studied.includes(t.id)) return false;
    return true;
  });
}

function activeFilterCount() {
  return (libFilters.faixa ? 1 : 0) + (libFilters.categoria ? 1 : 0) + (libFilters.posicao ? 1 : 0);
}

function filterAccordionGroup(key, icon, label, options, labelFn) {
  const isOpen = openFilterPanel === key;
  const current = libFilters[key];
  const currentLabel = current ? (labelFn ? labelFn(current) : current) : null;
  return `
  <div class="card" style="overflow:hidden;">
    <button data-toggle-filter="${key}" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;">
      <span style="font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:8px;">
        <span>${icon}</span> ${label}
        ${currentLabel ? `<span class="chip active" style="margin-left:2px;">${currentLabel}</span>` : ''}
      </span>
      <span style="color:var(--text-faint);transform:rotate(${isOpen?'180deg':'0deg'});transition:transform 0.2s;">▾</span>
    </button>
    ${isOpen ? `
    <div style="display:flex;gap:8px;flex-wrap:wrap;padding:0 14px 14px;border-top:1px solid var(--border);padding-top:12px;">
      ${options.map(opt => {
        const val = typeof opt === 'string' ? opt : opt.value;
        const lbl = typeof opt === 'string' ? (labelFn ? labelFn(opt) : opt) : opt.label;
        const active = current === val;
        return `<button class="chip ${active?'active':''}" data-filter-key="${key}" data-filter-value="${val}">${lbl}</button>`;
      }).join('')}
    </div>` : ''}
  </div>`;
}

function renderLibrary() {
  const studiedTotal = state.studied.length;
  const libTotal = TECHNIQUES.length;
  const results = filterTechniques();
  return `
  <div class="screen">
    <div class="eyebrow">Jiu Hub</div>
    <h1 style="font-size:26px;margin-top:4px;">Biblioteca de Técnicas</h1>
    <div style="margin-top:10px;">${beltStripes(5, Math.round((studiedTotal/libTotal)*5))}</div>
    <p style="font-size:12px;color:var(--text-faint);margin-top:6px;font-family:var(--font-mono);">${studiedTotal}/${libTotal} técnicas estudadas</p>
    <div style="margin-top:18px;display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--text-faint);">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3" stroke-linecap="round"/></svg>
      <input id="search-input" style="background:transparent;border:none;outline:none;flex:1;color:var(--text);font-size:14.5px;padding:0;" placeholder="Buscar técnica pelo nome..." value="${escapeHtml(libFilters.query)}" />
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:20px;margin-bottom:8px;">
      <span class="eyebrow">Filtros${activeFilterCount() ? ` · ${activeFilterCount()} ativo${activeFilterCount()>1?'s':''}` : ''}</span>
      ${activeFilterCount() ? `<button data-clear-filters="1" style="font-size:11px;color:var(--royal);font-family:var(--font-mono);">Limpar</button>` : ''}
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${filterAccordionGroup('faixa', '📌', 'Faixa', BELTS, (b) => BELT_LABELS[b])}
      ${filterAccordionGroup('categoria', '🥋', 'Categoria', CATEGORIES)}
      ${filterAccordionGroup('posicao', '📍', 'Posição', POSITIONS)}
    </div>

    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="chip ${libFilters.onlyFav?'active':''}" data-fav-filter="1">★ Favoritas</button>
      <button class="chip ${libFilters.onlyStudied?'active':''}" data-studied-filter="1">✓ Estudadas</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px;margin-top:18px;">
      ${results.length===0 ? `<div class="card" style="padding:24px;text-align:center;color:var(--text-dim);font-size:14px;">Nenhuma técnica encontrada com esses filtros.</div>` : results.map(techCard).join('')}
    </div>
  </div>`;
}

function techCard(t) {
  const isFav = state.favorites.includes(t.id);
  const isStudied = state.studied.includes(t.id);
  return `
  <div class="card" style="display:flex;flex-direction:column;overflow:hidden;">
    <button data-open="${t.id}" style="text-align:left;padding:14px 14px 12px;display:flex;flex-direction:column;gap:8px;width:100%;">
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <span class="chip">Faixa ${BELT_LABELS[t.faixa]}</span>
        <span class="chip">${t.categoria}</span>
        ${t.posicao ? `<span class="chip">📍 ${t.posicao}</span>` : ''}
      </div>
      <h3 style="font-size:16.5px;line-height:1.25;">${t.nome}</h3>
      <p style="font-size:13px;color:var(--text-dim);line-height:1.45;">${t.objetivo}</p>
    </button>
    <div style="display:flex;border-top:1px solid var(--border);">
      <button data-fav="${t.id}" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 0;font-size:12.5px;font-weight:500;color:${isFav?'var(--royal)':'var(--text-faint)'};">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="${isFav?'currentColor':'none'}" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-7.5-4.6-10-9.3C.5 8.2 2.4 4.5 6 4c2-.3 3.7.7 6 3 2.3-2.3 4-3.3 6-3 3.6.5 5.5 4.2 4 7.7C19.5 16.4 12 21 12 21Z" stroke-linejoin="round"/></svg>
        Favorito
      </button>
      <button data-study="${t.id}" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 0;font-size:12.5px;font-weight:500;color:${isStudied?'var(--jade)':'var(--text-faint)'};">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 12.5 9 17.5 20 6.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        ${isStudied?'Estudada':'Marcar'}

// ===== Check-in =====
const MONTH_NAMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const WEEKDAYS = ['D','S','T','Q','Q','S','S'];
function todayISO() { const d = new Date(); return d.toISOString().slice(0,10); }
function hasCheckedInToday() { return state.checkins.includes(todayISO()); }

function renderCheckin() {
  const total = state.checkins.length;
  const already = hasCheckedInToday();
  const { year, month } = checkinCursor;
  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const checkinSet = new Set(state.checkins);
  let cells = '';
  for (let i=0;i<startWeekday;i++) cells += `<div></div>`;
  let monthCount = 0;
  for (let d=1; d<=daysInMonth; d++) {
    const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const checked = checkinSet.has(iso);
    if (checked) monthCount++;
    cells += `<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;"><div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:12.5px;${checked ? 'background:linear-gradient(135deg,var(--royal),var(--jade));color:#fff;font-weight:700;border:none;' : 'color:var(--text-dim);background:var(--surface);border:1px solid var(--border);'}">${d}</div></div>`;
  }
  return `
  <div class="screen">
    <div class="eyebrow">Consistência é tudo</div>
    <h1 style="font-size:26px;margin-top:4px;">Check-in de Treinos</h1>
    <div class="card" style="margin-top:18px;padding:24px 20px;text-align:center;">
      <div class="mono" style="font-size:44px;font-weight:700;color:var(--royal);line-height:1;">${total}</div>
      <p style="font-size:14px;color:var(--text-dim);margin-top:8px;">${total===0 ? 'Você ainda não registrou nenhum treino.' : `Você já treinou ${total} ${total===1?'vez':'vezes'}!`}</p>
      <button id="checkin-btn" class="btn-primary" style="margin-top:16px;width:100%;${already?'opacity:0.55;':''}" ${already?'disabled':''}>${already ? 'Treino de hoje já registrado ✓' : 'Registrar treino de hoje'}</button>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:26px;">
      <button id="cal-prev" class="btn-ghost" style="padding:6px 14px;font-size:18px;line-height:1;">‹</button>
      <h3 style="font-size:15px;letter-spacing:0.04em;">${MONTH_NAMES[month]} ${year}</h3>
      <button id="cal-next" class="btn-ghost" style="padding:6px 14px;font-size:18px;line-height:1;">›</button>
    </div>
    <p style="font-size:12px;color:var(--text-faint);font-family:var(--font-mono);margin-top:4px;">${monthCount} treino${monthCount!==1?'s':''} neste mês</p>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);margin-top:14px;gap:4px;">
      ${WEEKDAYS.map(w => `<div style="text-align:center;font-size:11px;color:var(--text-faint);font-family:var(--font-mono);">${w}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:6px;">${cells}</div>
  </div>`;
}

// ===== Perfil =====
function studiedCountByBelt() {
  const counts = {};
  for (const b of BELTS) {
    const total = TECHNIQUES.filter(t => t.faixa===b).length;
    const studied = TECHNIQUES.filter(t => t.faixa===b && state.studied.includes(t.id)).length;
    counts[b] = { studied, total };
  }
  return counts;
}

function renderProfile() {
  const counts = studiedCountByBelt();
  const totalStudied = state.studied.length;
  const totalTech = TECHNIQUES.length;
  const pct = Math.round((totalStudied/totalTech)*100);
  const favTechniques = TECHNIQUES.filter(t => state.favorites.includes(t.id));

  const profileCardInner = editingProfile ? `

      <label style="display:flex;flex-direction:column;gap:6px;"><span class="eyebrow">Nome de guerra</span><input id="input-nomeguerra" value="${escapeHtml(state.profile.nomeGuerra)}" placeholder="Apelido no tatame" /></label>
      <label style="display:flex;flex-direction:column;gap:6px;">
        <span class="eyebrow">Faixa</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${BELTS.map(b => `<button class="chip belt-select ${state.profile.faixa===b?'active':''}" data-belt-select="${b}">${BELT_LABELS[b]}</button>`).join('')}
        </div>
      </label>
      <button id="save-profile" class="btn-primary" style="margin-top:6px;">Salvar perfil</button>
    </div>

const IBJJF_POINTS = [

  { acao: 'Joelho na Barriga', pontos: 2, desc: 'Estabilizar o joelho no abdômen do oponente com controle.' },
  { acao: 'Passagem de Guarda', pontos: 3, desc: 'Superar as pernas do oponente e estabilizar o controle por cima.' },
  { acao: 'Montada', pontos: 4, desc: 'Estabilizar a posição montada sobre o oponente.' },
  { acao: 'Pegada de Costas', pontos: 4, desc: 'Controlar as costas do oponente com pelo menos um gancho ou corpo a corpo estável.' }

];

  'Golpes, cotoveladas, joelhadas ou qualquer ataque fora das regras do jiu-jítsu esportivo.',

];

// ===== ações de estado =====
function toggleFavorite(id) {
  const i = state.favorites.indexOf(id);
  if (i>=0) state.favorites.splice(i,1); else state.favorites.push(id);
  persist();
}
function toggleStudied(id) {
  const i = state.studied.indexOf(id);
  if (i>=0) state.studied.splice(i,1); else state.studied.push(id);
  persist();
}
function checkinToday() {
  const iso = todayISO();
  if (!state.checkins.includes(iso)) { state.checkins.push(iso); state.checkins.sort(); }
  persist();
}

function escapeHtml(s) {
  return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// ===== bind eventos da tela atual =====
function bindPaneEvents() {
  const pane = document.getElementById('pane');
  if (!pane) return;

  const searchInput = document.getElementById('search-input');
  if (searchInput) {
    searchInput.addEventListener('input', (e) => {
      libFilters.query = e.target.value;
      const list = pane.querySelectorAll('.card');
      renderLibraryListOnly();
    });
    const len = searchInput.value.length;
    searchInput.focus();
    searchInput.setSelectionRange(len, len);
  }

  pane.querySelectorAll('[data-toggle-filter]').forEach(btn => btn.addEventListener('click', () => {
    const key = btn.dataset.toggleFilter;
    openFilterPanel = openFilterPanel === key ? null : key;
    render();
  }));
  pane.querySelectorAll('[data-filter-key]').forEach(btn => btn.addEventListener('click', () => {
    const key = btn.dataset.filterKey;
    const val = btn.dataset.filterValue;
    libFilters[key] = libFilters[key] === val ? null : val;
    openFilterPanel = null;
    render();
  }));
  const clearBtn = pane.querySelector('[data-clear-filters]');
  if (clearBtn) clearBtn.addEventListener('click', () => {
    libFilters.faixa = null; libFilters.categoria = null; libFilters.posicao = null;
    openFilterPanel = null;
    render();
  });
  pane.querySelectorAll('[data-fav-filter]').forEach(btn => btn.addEventListener('click', () => {
    libFilters.onlyFav = !libFilters.onlyFav; render();
  }));
  pane.querySelectorAll('[data-studied-filter]').forEach(btn => btn.addEventListener('click', () => {
    libFilters.onlyStudied = !libFilters.onlyStudied; render();
  }));
  pane.querySelectorAll('[data-open]').forEach(btn => btn.addEventListener('click', () => {
    selectedTechnique = TECHNIQUES.find(t => t.id === btn.dataset.open);
    renderModal();
  }));
  pane.querySelectorAll('[data-fav]').forEach(btn => btn.addEventListener('click', () => {
    toggleFavorite(btn.dataset.fav); render();
  }));
  pane.querySelectorAll('[data-study]').forEach(btn => btn.addEventListener('click', () => {
    toggleStudied(btn.dataset.study); render();
  }));

  const checkinBtn = document.getElementById('checkin-btn');
  if (checkinBtn) checkinBtn.addEventListener('click', () => { checkinToday(); render(); });
  const calPrev = document.getElementById('cal-prev');
  if (calPrev) calPrev.addEventListener('click', () => { shiftMonth(-1); render(); });
  const calNext = document.getElementById('cal-next');
  if (calNext) calNext.addEventListener('click', () => { shiftMonth(1); render(); });

  const editBtn = document.getElementById('edit-profile');
  if (editBtn) editBtn.addEventListener('click', () => { editingProfile = true; render(); });
  const saveBtn = document.getElementById('save-profile');
  if (saveBtn) saveBtn.addEventListener('click', () => {
    state.profile.nome = document.getElementById('input-nome').value.trim();
    state.profile.nomeGuerra = document.getElementById('input-nomeguerra').value.trim();
    persist();
    editingProfile = false;
    render();
  });
  pane.querySelectorAll('[data-belt-select]').forEach(btn => btn.addEventListener('click', () => {
    state.profile.faixa = btn.dataset.beltSelect;
    render();
  }));
  const termsBtn = document.getElementById('open-terms');
  if (termsBtn) termsBtn.addEventListener('click', () => { showTerms = true; renderTerms(); });
}

function renderLibraryListOnly() {
  // re-render only the list container to avoid losing input focus while typing
  const pane = document.getElementById('pane');
  const listContainer = pane.querySelector('.screen > div[style*="flex-direction:column"][style*="gap:12px"]');
  const results = filterTechniques();
  if (listContainer) {
    listContainer.innerHTML = results.length===0 ? `<div class="card" style="padding:24px;text-align:center;color:var(--text-dim);font-size:14px;">Nenhuma técnica encontrada com esses filtros.</div>` : results.map(techCard).join('');
    pane.querySelectorAll('[data-open]').forEach(btn => btn.addEventListener('click', () => {
      selectedTechnique = TECHNIQUES.find(t => t.id === btn.dataset.open);
      renderModal();
    }));
    pane.querySelectorAll('[data-fav]').forEach(btn => btn.addEventListener('click', () => {
      toggleFavorite(btn.dataset.fav); render();
    }));
    pane.querySelectorAll('[data-study]').forEach(btn => btn.addEventListener('click', () => {
      toggleStudied(btn.dataset.study); render();
    }));
  }
}

function shiftMonth(delta) {
  let { year, month } = checkinCursor;
  month += delta;
  if (month < 0) { month = 11; year -= 1; }
  if (month > 11) { month = 0; year += 1; }
  checkinCursor = { year, month };
}

render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

</script>

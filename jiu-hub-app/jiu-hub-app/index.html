<style>
:root {
  --bg: #0a0e13;
  --surface: #131a22;
  --surface-2: #1a2029;
  --surface-3: #212a35;
  --border: #232c38;
  --text: #e9edf3;
  --text-dim: #9aa5b3;
  --text-faint: #5f6b7a;
  --royal: #3358ff;
  --royal-dim: #1c2f7a;
  --jade: #19c982;
  --danger: #ff5470;
  --belt-branca: #f4f2ea;
  --belt-azul: #3358ff;
  --belt-roxa: #8b5cf6;
  --belt-marrom: #7a4a2e;
  --belt-preta: #14171c;
  --font-display: 'Oswald', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius-sm: 10px;
  --radius-md: 14px;
  color-scheme: dark;
}
* { box-sizing: border-box; }
html, body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family:var(--font-body); }
body { background-image: radial-gradient(circle at 15% 0%, rgba(51,88,255,0.10), transparent 45%), radial-gradient(circle at 100% 10%, rgba(25,201,130,0.06), transparent 40%); background-attachment: fixed; }
#root { max-width:560px; margin:0 auto; min-height:100dvh; position:relative; display:flex; flex-direction:column; }
h1,h2,h3,h4 { font-family:var(--font-display); font-weight:600; letter-spacing:0.02em; text-transform:uppercase; margin:0; }
p { margin:0; }
button { font-family:var(--font-body); cursor:pointer; border:none; background:none; color:inherit; }
input, select, textarea { font-family:var(--font-body); color:var(--text); }
a { color:inherit; }
::-webkit-scrollbar { width:0; height:0; }
.mono { font-family:var(--font-mono); }
.belt-stripes { display:flex; gap:4px; height:6px; }
.belt-stripes .seg { flex:1; border-radius:2px; background:var(--surface-3); }
.belt-stripes .seg.filled { background: linear-gradient(90deg, var(--royal), var(--jade)); }
.screen { flex:1; padding:20px 18px calc(96px + env(safe-area-inset-bottom)); overflow-y:auto; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
.eyebrow { font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-faint); }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); }
.chip { font-family:var(--font-mono); font-size:11px; padding:5px 10px; border-radius:999px; border:1px solid var(--border); color:var(--text-dim); background:var(--surface-2); white-space:nowrap; flex-shrink:0; }
.chip.active { background:var(--royal-dim); border-color:var(--royal); color:#cdd9ff; }
.btn-primary { background:var(--royal); color:#fff; font-weight:600; border-radius:var(--radius-sm); padding:13px 18px; font-size:15px; text-align:center; }
.btn-primary:disabled { opacity:0.5; }
.btn-ghost { background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:var(--radius-sm); padding:12px 18px; font-size:14px; font-weight:500; }
input[type=text], input:not([type]) { background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:11px 14px; font-size:14px; outline:none; width:100%; }
select { background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:11px 14px; font-size:14px; outline:none; width:100%; }
.bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:560px; display:flex; justify-content:space-around; background:rgba(19,26,34,0.92); backdrop-filter:blur(14px); border-top:1px solid var(--border); padding:10px 8px calc(10px + env(safe-area-inset-bottom)); z-index:50; }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; color:var(--text-faint); }
.nav-item.active { color:var(--royal); }
.nav-item span { font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.04em; }
.hidden { display:none !important; }
.backdrop { position:fixed; inset:0; background:rgba(5,7,10,0.72); display:flex; align-items:flex-end; justify-content:center; z-index:100; }
.sheet { width:100%; max-width:560px; max-height:90dvh; overflow-y:auto; background:var(--surface); border-top:1px solid var(--border); border-top-left-radius:22px; border-top-right-radius:22px; padding:10px 20px calc(28px + env(safe-area-inset-bottom)); }
.handle { width:40px; height:4px; border-radius:2px; background:var(--surface-3); margin:6px auto 14px; }
.close-btn { width:30px; height:30px; border-radius:50%; background:var(--surface-2); border:1px solid var(--border); color:var(--text-dim); flex-shrink:0; }
</style>

<script>
const TECHNIQUES = [{"id":"t001","videoSearch":"https://www.youtube.com/results?search_query=Armlock%20da%20Guarda%20Fechada%20bjj%20tecnica","nome":"Armlock da Guarda Fechada","categoria":"Finalização","faixa":"branca","posicao":"Guarda Fechada","objetivo":"Finalizar o cotovelo do oponente a partir da guarda fechada, controlando o braço e o quadril.","passos":["A partir da guarda fechada, controle um dos pulsos do oponente com as duas mãos.","Suba o quadril e passe a perna correspondente por cima do ombro dele.","Abra a guarda e gire o corpo 90°, formando um ângulo perpendicular ao oponente.","Feche as pernas sobre o peito dele (uma no pescoço, outra no quadril) prendendo o braço entre suas pernas.","Empurre o quadril para cima e puxe o pulso para baixo, estendendo o cotovelo."],"dicas":["Mantenha o joelho da perna que passa por cima colado no ombro do oponente para ele não tirar o braço.","Aperte os joelhos entre si para não perder o controle do braço."],"erros":["Abrir espaço entre os joelhos, permitindo que o oponente puxe o braço de volta.","Girar o quadril sem antes controlar bem o pulso."]},{"id":"t002","videoSearch":"https://www.youtube.com/results?search_query=Estrangulamento%20da%20Cruz%20(Cross%20Collar%20Choke)%20bjj%20tecnica","nome":"Estrangulamento da Cruz (Cross Collar Choke)","categoria":"Finalização","faixa":"branca","posicao":"Guarda Fechada","objetivo":"Estrangular usando a gola do kimono a partir da guarda fechada, cruzando as mãos.","passos":["Com a guarda fechada, agarre a gola oposta do oponente com a mão direita, palma para cima, profundamente.","Agarre a outra gola com a mão esquerda, por fora do braço direito.","Traga os cotovelos para dentro, próximos ao corpo do oponente.","Puxe as mãos em direções opostas, fechando a gola contra o pescoço."],"dicas":["A primeira mão precisa entrar bem funda na gola para o estrangulamento fechar de verdade.","Use a guarda fechada para impedir que o oponente crie distância enquanto você ajusta as pegadas."],"erros":["Pegar a gola de forma rasa, o que faz o estrangulamento perder força.","Abrir os cotovelos para fora, aliviando a pressão no pescoço."]},{"id":"t003","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%20da%20Tesoura%20(Scissor%20Sweep)%20bjj%20tecnica","nome":"Raspagem da Tesoura (Scissor Sweep)","categoria":"Raspagem","faixa":"branca","posicao":"Guarda Fechada","objetivo":"Derrubar o oponente da posição ajoelhada dentro da sua guarda usando as pernas em tesoura.","passos":["Da guarda, quebre a postura do oponente puxando a gola e a manga.","Gire para o lado, colocando uma canela cruzada no abdômen dele.","Coloque a outra perna baixa, atrás da perna dele, como se fosse cortar a base.","Puxe com os braços e faça as duas pernas se moverem em direções opostas, como uma tesoura.","Suba por cima ao finalizar a raspagem."],"dicas":["Quebrar a postura antes de girar é o que faz a raspagem funcionar.","A perna de baixo corta a base; a perna de cima empurra — sincronize os dois movimentos."],"erros":["Tentar raspar sem antes quebrar a postura do oponente.","Fazer o movimento devagar, dando tempo do oponente basear a mão no chão."]},{"id":"t004","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%20de%20Quadril%20(Hip%20Bump%20Sweep)%20bjj%20tecnica","nome":"Raspagem de Quadril (Hip Bump Sweep)","categoria":"Raspagem","faixa":"branca","posicao":"Guarda Fechada","objetivo":"Usar a explosão de quadril para derrubar o oponente quando ele está sentado com a postura ereta.","passos":["Da guarda fechada, sente-se em direção ao oponente, apoiando uma mão no chão atrás de você.","Jogue o quadril para cima e para frente, batendo contra o abdômen dele.","Abra a guarda e jogue uma perna por cima da cabeça dele para completar a virada.","Termine em cima, na posição montada."],"dicas":["O apoio da mão atrás é o que gera a explosão do quadril.","Sincronize o movimento do quadril com a jogada da perna por cima da cabeça."],"erros":["Empurrar só com o braço, sem usar o quadril.","Deixar a perna de apoio muito esticada, perdendo potência."]},{"id":"t005","videoSearch":"https://www.youtube.com/results?search_query=Passagem%20de%20Guarda%20por%20Joelho%20(Knee%20Slide)%20bjj%20tecnica","nome":"Passagem de Guarda por Joelho (Knee Slide)","categoria":"Passagem de Guarda","faixa":"branca","posicao":"Guarda Aberta","objetivo":"Passar a guarda controlando uma perna do oponente e deslizando o joelho por cima dela.","passos":["Controle uma perna do oponente pelo tornozelo e empurre-a para o lado.","Deslize o joelho por cima dessa perna, rente ao corpo do oponente.","Controle o quadril dele com a mão livre para evitar que ele recomponha a guarda.","Estabilize o peso no peito antes de buscar o lado."],"dicas":["Mantenha o joelho colado no chão e no corpo do oponente durante o deslize.","Controle o quadril antes de soltar a perna que você segurava."],"erros":["Deixar espaço entre o joelho e o corpo do oponente, facilitando a recomposição de guarda.","Passar sem antes desviar a perna dele."]},{"id":"t006","videoSearch":"https://www.youtube.com/results?search_query=Fuga%20da%20Montada%20(Upa%20%2F%20Bridge%20and%20Roll)%20bjj%20tecnica","nome":"Fuga da Montada (Upa / Bridge and Roll)","categoria":"Passagem de Guarda","faixa":"branca","posicao":"Montada","objetivo":"Escapar da posição montada usando a ponte para derrubar o oponente para o lado.","passos":["Trave um dos braços do oponente junto ao seu corpo e prenda a perna do mesmo lado com a sua.","Faça uma ponte forte com o quadril, elevando o oponente para cima.","Gire o corpo na direção do braço travado, jogando o oponente para o lado.","Finalize por cima, na guarda ou meia-guarda."],"dicas":["A ponte precisa ser explosiva e alta, não só para o lado.","Prender bem o braço e a perna do mesmo lado é o que garante a virada."],"erros":["Fazer a ponte sem travar braço e perna, o que faz o oponente apenas rebalancear.","Girar antes da ponte tirar o oponente do chão."]},{"id":"t007","videoSearch":"https://www.youtube.com/results?search_query=Fuga%20da%20100%20kg%20(Escape%20do%20Side%20Control)%20bjj%20tecnica","nome":"Fuga da 100 kg (Escape do Side Control)","categoria":"Passagem de Guarda","faixa":"branca","posicao":"Controle Lateral","objetivo":"Recompor a guarda a partir do controle lateral (100 kg), criando espaço com o quadril.","passos":["Coloque as mãos no pescoço e no quadril do oponente para criar uma barreira (frame).","Empurre com os frames e \"camaroneie\" (shrimp), afastando o quadril dele.","Traga o joelho para dentro do espaço criado, reconectando a guarda.","Repita o movimento se necessário até recuperar a guarda completa."],"dicas":["O frame no pescoço evita que o oponente estabilize o peso no seu peito.","O movimento de camarão (shrimp) vem do quadril, não só das pernas."],"erros":["Empurrar o oponente só com os braços, sem mover o quadril.","Tentar recompor a guarda sem antes criar espaço."]},{"id":"t008","videoSearch":"https://www.youtube.com/results?search_query=Mata-Le%C3%A3o%20(Rear%20Naked%20Choke)%20bjj%20tecnica","nome":"Mata-Leão (Rear Naked Choke)","categoria":"Finalização","faixa":"branca","posicao":"Costas","objetivo":"Finalizar pelas costas, estrangulando com o antebraço sem depender do kimono.","passos":["Com as costas do oponente controladas e ganchos ou triângulo de pernas fixados, passe um braço pelo pescoço dele.","Feche a mão desse braço na dobra do outro braço (bíceps).","Coloque a outra mão atrás da cabeça do oponente.","Aperte os braços e puxe a cabeça para frente, fechando o estrangulamento."],"dicas":["O antebraço deve ficar na altura do pescoço, não no queixo.","Controlar bem as costas antes de buscar a finalização evita que o oponente escape."],"erros":["Colocar o braço alto demais, prendendo apenas o queixo em vez do pescoço.","Soltar o controle das costas para tentar acelerar a finalização."]},{"id":"t009","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%20Borboleta%20(Butterfly%20Sweep)%20bjj%20tecnica","nome":"Raspagem Borboleta (Butterfly Sweep)","categoria":"Raspagem","faixa":"branca","posicao":"Guarda Aberta","objetivo":"Raspar o oponente ajoelhado à sua frente usando os ganchos de guarda borboleta.","passos":["Sente-se com os ganchos dos pés por dentro das coxas do oponente (guarda borboleta).","Controle uma manga e a gola ou o tríceps do oponente, quebrando a postura dele para o seu lado.","Eleve o gancho do lado do desequilíbrio, erguendo a perna dele do chão.","Complete o giro do corpo na mesma direção, subindo por cima ao finalizar."],"dicas":["O desequilíbrio para o lado antes de erguer o gancho é o que faz a raspagem funcionar.","Mantenha o peito próximo ao do oponente para não perder a base durante o giro."],"erros":["Erguer o gancho sem antes quebrar a postura do oponente para o lado.","Ficar longe do corpo do oponente, perdendo o controle da parte de cima."]},{"id":"t010","videoSearch":"https://www.youtube.com/results?search_query=Passagem%20por%20Empilhamento%20(Stack%20Pass)%20bjj%20tecnica","nome":"Passagem por Empilhamento (Stack Pass)","categoria":"Passagem de Guarda","faixa":"branca","posicao":"Guarda Aberta","objetivo":"Passar a guarda aberta empilhando as pernas do oponente sobre a cabeça dele.","passos":["Controle os dois tornozelos do oponente e afaste-os para os lados do próprio corpo.","Avance o quadril entre as pernas dele, mantendo a base baixa.","Empurre os pés dele em direção à cabeça dele, \"empilhando\" o corpo para cima.","Contorne para o lado assim que o quadril dele perder a mobilidade."],"dicas":["Mantenha a coluna reta ao empurrar, para não perder a base para frente.","Funciona melhor contra oponentes com a guarda mais baixa e fechada."],"erros":["Empurrar apenas com os braços, sem avançar o quadril.","Ficar muito alto, facilitando uma raspagem do oponente."]},{"id":"t011","videoSearch":"https://www.youtube.com/results?search_query=Estrangulamento%20em%20Cruz%20do%20Monte%20bjj%20tecnica","nome":"Estrangulamento em Cruz do Monte","categoria":"Finalização","faixa":"branca","posicao":"Montada","objetivo":"Aplicar o estrangulamento da cruz a partir da posição montada, com mais peso e ângulo a favor.","passos":["Da montada, agarre a gola oposta do oponente com uma mão, palma para cima, profundamente.","Agarre a outra gola com a outra mão, por fora do primeiro braço.","Feche os cotovelos junto ao corpo do oponente, mantendo o peso centrado.","Puxe as mãos em direções opostas, fechando a gola contra o pescoço."],"dicas":["Manter o quadril baixo e pesado dificulta que o oponente crie espaço para se defender.","A pegada profunda na primeira gola é o que garante a força do estrangulamento."],"erros":["Ficar alto demais na montada, facilitando a defesa do pescoço.","Pegar a gola de forma rasa."]},{"id":"t012","videoSearch":"https://www.youtube.com/results?search_query=Fuga%20do%20Mata-Le%C3%A3o%20(Escape%20do%20Estrangulamento%20de%20Costas)%20bjj%20tecnica","nome":"Fuga do Mata-Leão (Escape do Estrangulamento de Costas)","categoria":"Finalização","faixa":"branca","posicao":"Costas","objetivo":"Escapar do estrangulamento pelas costas antes que o oponente feche a chave por completo.","passos":["Ao sentir o braço do oponente passar pelo pescoço, encolha o queixo e trave o braço dele com as duas mãos.","Gire o corpo em direção ao braço que estrangula, buscando ficar de frente para o oponente.","Use o cotovelo e o ombro para criar espaço entre o antebraço dele e o seu pescoço.","Complete o giro até neutralizar os ganchos e ficar de frente para o oponente."],"dicas":["Encolher o queixo imediatamente é o passo mais importante e deve ser reflexo.","Girar em direção ao braço que estrangula, e não para o lado contrário, facilita a saída."],"erros":["Girar para o lado errado, o que ajuda o oponente a fechar ainda mais o estrangulamento.","Esperar demais para agir, perdendo a janela de escape."]},{"id":"t013","videoSearch":"https://www.youtube.com/results?search_query=Passagem%20por%20Arrasto%20de%20Bra%C3%A7o%20(Arm%20Drag)%20bjj%20tecnica","nome":"Passagem por Arrasto de Braço (Arm Drag)","categoria":"Passagem de Guarda","faixa":"branca","posicao":"Guarda Aberta","objetivo":"Puxar o braço do oponente para o lado a fim de expor as costas dele e facilitar a passagem.","passos":["Controle o pulso do oponente e puxe o braço dele para o seu lado enquanto avança o corpo.","Traga o próprio corpo por baixo do braço puxado, buscando o lado das costas dele.","Estabeleça um \"hook\" com a perna ou o braço para impedir que ele volte de frente.","Consolide o controle lateral ou das costas assim que o ângulo estiver garantido."],"dicas":["O arrasto precisa vir combinado com um avanço do corpo, não só a puxada do braço.","Funciona bem tanto em pé quanto no chão, contra guardas abertas."],"erros":["Puxar o braço sem avançar o corpo, o que permite ao oponente se ajustar.","Soltar o controle do ângulo conquistado antes de consolidar a posição."]},{"id":"t014","videoSearch":"https://www.youtube.com/results?search_query=Chave%20de%20Tornozelo%20B%C3%A1sica%20(Straight%20Ankle%20Lock)%20bjj%20tecnica","nome":"Chave de Tornozelo Básica (Straight Ankle Lock)","categoria":"Finalização","faixa":"branca","posicao":"50/50","objetivo":"Finalizar o tornozelo do oponente pressionando o tendão de Aquiles, a partir de um controle simples de perna.","passos":["Sente-se de frente para a planta do pé do oponente, com a perna dele entre as suas.","Posicione o antebraço por baixo do tendão de Aquiles, próximo ao osso do tornozelo.","Feche a chave levando a outra mão para reforçar a pressão do antebraço.","Incline o tronco para trás, aplicando pressão gradual no tendão."],"dicas":["Prender o joelho do oponente com as próprias pernas evita que ele gire e escape.","Aplique a pressão devagar, sempre atento ao sinal de que o parceiro quer parar (bater)."],"erros":["Deixar o pé do oponente girar livremente, perdendo a linha de pressão.","Aplicar a força de forma explosiva em vez de gradual."]},{"id":"t015","videoSearch":"https://www.youtube.com/results?search_query=Fuga%20da%20Meia-Guarda%20(Recupera%C3%A7%C3%A3o%20da%20Guarda)%20bjj%20tecnica","nome":"Fuga da Meia-Guarda (Recuperação da Guarda)","categoria":"Passagem de Guarda","faixa":"branca","posicao":"Meia-Guarda","objetivo":"Recuperar a guarda completa a partir da meia-guarda, criando espaço com o quadril.","passos":["Na meia-guarda, prenda uma das pernas do oponente entre as suas.","Crie um frame (barreira) com o braço no pescoço ou ombro dele para afastar o peso.","Gire o quadril para o lado, \"camaroneando\" para criar espaço.","Traga a perna livre por cima, reconectando na guarda completa."],"dicas":["O frame no ombro ou pescoço evita que o oponente estabilize o peso em cima.","Prender bem a perna dele com a meia-guarda é o que sustenta toda a fuga."],"erros":["Tentar recompor a guarda sem antes criar espaço com o frame.","Soltar a perna presa antes de reconectar a guarda completa."]},{"id":"t016","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%20Old%20School%20(Meia-Guarda)%20bjj%20tecnica","nome":"Raspagem Old School (Meia-Guarda)","categoria":"Raspagem","faixa":"branca","posicao":"Meia-Guarda","objetivo":"Raspar o oponente a partir da meia-guarda controlando o tornozelo dele por baixo.","passos":["Na meia-guarda, prenda o tornozelo da perna de apoio do oponente com a mão de baixo.","Controle o pulso ou a manga dele do lado oposto com a outra mão.","Puxe o tornozelo enquanto empurra o corpo dele para o lado controlado.","Complete o giro subindo por cima assim que ele perder a base."],"dicas":["Prender o tornozelo antes de puxar é essencial — sem isso ele apenas recua a perna.","A puxada do pulso e do tornozelo devem acontecer ao mesmo tempo."],"erros":["Puxar o tornozelo sem controlar o braço, permitindo que o oponente se equilibre com a mão.","Soltar o tornozelo cedo demais, antes de completar o giro."]},{"id":"t017","videoSearch":"https://www.youtube.com/results?search_query=Passagem%20Joelho%20na%20Barriga%20bjj%20tecnica","nome":"Passagem Joelho na Barriga","categoria":"Passagem de Guarda","faixa":"branca","posicao":"Joelho na Barriga","objetivo":"Estabelecer o controle de joelho na barriga a partir do controle lateral, ganhando mobilidade.","passos":["Do controle lateral, controle o pulso distante e a gola próxima do oponente.","Suba o joelho mais próximo até o abdômen dele, mantendo o peso concentrado ali.","Estenda a perna de trás para trás, criando uma base triangular estável.","Mantenha a pressão do joelho ajustando o peso conforme o oponente se movimenta."],"dicas":["O peso deve ficar concentrado no joelho, não distribuído no pé de trás.","Controlar o pulso distante evita que o oponente crie espaço com o braço."],"erros":["Deixar peso demais na perna de trás, reduzindo a pressão do joelho.","Perder o controle do pulso, permitindo que o oponente empurre e crie espaço."]},{"id":"t018","videoSearch":"https://www.youtube.com/results?search_query=Estrangulamento%20da%20Gola%20no%20Joelho%20na%20Barriga%20bjj%20tecnica","nome":"Estrangulamento da Gola no Joelho na Barriga","categoria":"Finalização","faixa":"branca","posicao":"Joelho na Barriga","objetivo":"Estrangular o oponente a partir do joelho na barriga, aproveitando a gola próxima já exposta.","passos":["Do joelho na barriga, com a gola próxima já controlada, agarre a gola oposta com a outra mão.","Cruze os braços de forma que os pulsos fiquem próximos ao pescoço do oponente.","Mantenha o joelho firme no abdômen para impedir que ele gire e alivie a pressão.","Puxe as mãos em direções opostas, fechando o estrangulamento."],"dicas":["A pressão do joelho no abdômen impede a defesa das mãos do oponente no pescoço.","Mantenha o peso baixo e estável antes de soltar uma das mãos para pegar a segunda gola."],"erros":["Soltar a pressão do joelho para buscar a segunda gola, dando espaço para o oponente se defender.","Pegar a gola de forma rasa, perdendo força no estrangulamento final."]},{"id":"t019","videoSearch":"https://www.youtube.com/results?search_query=Fuga%20do%20Turtle%20para%20a%20Guarda%20bjj%20tecnica","nome":"Fuga do Turtle para a Guarda","categoria":"Passagem de Guarda","faixa":"branca","posicao":"Turtle","objetivo":"Sair da posição de quatro apoios (turtle) e recuperar a guarda antes que o oponente tome as costas.","passos":["Na posição de turtle, gire o corpo em direção ao braço ou perna que o oponente está atacando.","Traga um braço para dentro, protegendo o pescoço, enquanto gira o quadril.","Sente-se de lado, apoiando-se em um braço para não ficar de costas para o chão.","Complete o giro, colocando uma perna entre você e o oponente para formar a guarda."],"dicas":["Girar sempre em direção ao lado onde o oponente está mais fraco ou menos apoiado.","Proteger o pescoço com o braço durante o giro evita ataques de estrangulamento pelas costas."],"erros":["Girar sem proteger o pescoço, ficando vulnerável a estrangulamentos.","Ficar parado na posição de turtle por muito tempo sem iniciar o giro."]},{"id":"t020","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%20do%20Turtle%20(Sit-Out%20Sweep)%20bjj%20tecnica","nome":"Raspagem do Turtle (Sit-Out Sweep)","categoria":"Raspagem","faixa":"branca","posicao":"Turtle","objetivo":"Raspar o oponente que está ao lado da posição de turtle usando um giro do quadril (sit-out).","passos":["Na posição de turtle, sinta o oponente se posicionar ao seu lado tentando o controle.","Jogue a perna de baixo para fora, \"sentando\" o quadril na direção oposta ao oponente.","Use o braço de apoio para empurrar o corpo dele durante o giro.","Complete o giro até ficar por cima ou lateral ao oponente."],"dicas":["O momento do giro deve coincidir com o instante em que o oponente muda de lado.","Manter o braço de apoio forte no chão evita que o giro perca força."],"erros":["Girar sem sentir o momento certo da mudança de base do oponente.","Deixar o braço de apoio dobrar, perdendo força no giro."]},{"id":"t021","videoSearch":"https://www.youtube.com/results?search_query=Imobiliza%C3%A7%C3%A3o%20Norte-Sul%20com%20Controle%20de%20Bra%C3%A7os%20bjj%20tecnica","nome":"Imobilização Norte-Sul com Controle de Braços","categoria":"Passagem de Guarda","faixa":"branca","posicao":"Norte-Sul","objetivo":"Estabilizar o controle norte-sul, neutralizando os dois braços do oponente para evitar fugas.","passos":["Com a cabeça na altura do quadril do oponente e o peso do peito sobre o peito dele, prenda um braço dele com a mão.","Use a outra mão para controlar o segundo braço, mantendo os cotovelos dele afastados do corpo.","Distribua o peso de forma a manter o quadril baixo e colado ao dele.","Ajuste continuamente a pressão conforme o oponente tenta girar para os lados."],"dicas":["Controlar os dois braços ao mesmo tempo é o que impede a maioria das fugas dessa posição.","Mantenha os joelhos próximos ao corpo para não perder a base lateral."],"erros":["Deixar um dos braços do oponente livre, o que facilita a fuga dele.","Ficar muito alto sobre o peito dele, perdendo estabilidade."]},{"id":"t022","videoSearch":"https://www.youtube.com/results?search_query=Fuga%20do%20Controle%20Lateral%20por%20Baixo%20do%20Bra%C3%A7o%20(Underhook%20Escape)%20bjj%20tecnica","nome":"Fuga do Controle Lateral por Baixo do Braço (Underhook Escape)","categoria":"Passagem de Guarda","faixa":"branca","posicao":"Controle Lateral","objetivo":"Escapar do controle lateral criando um underhook para reconstruir a base e recuperar a guarda.","passos":["Do controle lateral, passe um braço por baixo do braço do oponente que está mais próximo.","Use o underhook para começar a virar de lado, tirando o quadril de baixo do peso dele.","Traga o joelho de dentro para criar uma barreira entre você e o oponente.","Complete o giro para os quatro apoios ou para recompor a guarda."],"dicas":["O underhook deve vir combinado com o movimento do quadril, não apenas do braço.","Manter o queixo protegido durante o giro evita exposição ao estrangulamento."],"erros":["Buscar o underhook sem mover o quadril, o que não gera espaço suficiente.","Girar de forma lenta, dando tempo do oponente reajustar o controle."]},{"id":"t023","videoSearch":"https://www.youtube.com/results?search_query=Tri%C3%A2ngulo%20da%20Guarda%20bjj%20tecnica","nome":"Triângulo da Guarda","categoria":"Finalização","faixa":"azul","posicao":"Guarda Aberta","objetivo":"Estrangular usando as próprias pernas, prendendo o pescoço do oponente e um dos braços dele.","passos":["Da guarda aberta, puxe um braço do oponente para dentro e jogue uma perna sobre o ombro oposto.","Cruze os pés e trave o joelho atrás do próprio joelho, formando o triângulo.","Gire o quadril para o lado do braço livre do oponente, alinhando o ângulo.","Puxe a cabeça dele para baixo com as mãos, fechando o estrangulamento com as pernas."],"dicas":["O ângulo é essencial: gire o quadril para debaixo do braço livre do oponente.","Quanto mais fechado o joelho contra o próprio corpo, mais forte o estrangulamento."],"erros":["Ficar de frente para o oponente sem girar o ângulo do quadril.","Deixar o joelho aberto, o que tira a pressão do pescoço."]},{"id":"t024","videoSearch":"https://www.youtube.com/results?search_query=Omoplata%20bjj%20tecnica","nome":"Omoplata","categoria":"Finalização","faixa":"azul","posicao":"Guarda Aberta","objetivo":"Torcer o ombro do oponente usando as pernas, a partir da guarda.","passos":["Da guarda, controle um braço do oponente e passe a perna do mesmo lado por cima do ombro dele.","Gire o corpo para trás, ficando perpendicular, prendendo o braço entre as pernas.","Sente-se em direção à cabeça dele, subindo o quadril.","Controle o quadril do oponente com as mãos para impedir que ele gire e escape."],"dicas":["Controlar o quadril do oponente durante a subida é o que evita a rolada de escape.","Mantenha o braço dele preso rente ao seu corpo o tempo todo."],"erros":["Subir o quadril sem controlar o quadril do oponente, permitindo que ele role para a frente.","Deixar espaço entre a sua perna e o ombro dele."]},{"id":"t025","videoSearch":"https://www.youtube.com/results?search_query=Flower%20Sweep%20(P%C3%AAndulo)%20bjj%20tecnica","nome":"Flower Sweep (Pêndulo)","categoria":"Raspagem","faixa":"azul","posicao":"Guarda Aberta","objetivo":"Raspar o oponente que está ajoelhado, prendendo um braço e balançando a perna como um pêndulo.","passos":["Da guarda aberta, prenda um braço do oponente entre suas pernas, controlando o pulso.","Coloque o pé oposto no quadril dele para criar distância e base.","Balance a perna livre por baixo, gerando embalo, e jogue-a por cima da cabeça dele.","Complete o giro subindo por cima na posição montada."],"dicas":["O braço precisa estar bem preso para o oponente não apoiar a mão e neutralizar a raspagem.","O embalo da perna livre vem do quadril, não só do joelho."],"erros":["Prender o pulso de forma rasa, permitindo que o oponente solte o braço.","Perder a base do pé no quadril antes de completar o giro."]},{"id":"t026","videoSearch":"https://www.youtube.com/results?search_query=Passagem%20por%20Baixo%20e%20por%20Cima%20(Over-Under%20Pass)%20bjj%20tecnica","nome":"Passagem por Baixo e por Cima (Over-Under Pass)","categoria":"Passagem de Guarda","faixa":"azul","posicao":"Guarda Aberta","objetivo":"Passar a guarda aberta combinando o controle de uma perna por baixo do braço e outra por cima.","passos":["Ajoelhado dentro da guarda, passe um braço por baixo de uma perna do oponente.","Com o outro braço, controle a outra perna por cima, unindo as mãos atrás das costas dele.","Suba o quadril e empurre o peito para frente, pressionando as pernas do oponente para o mesmo lado.","Deslize o corpo para o lado livre até estabilizar o controle lateral."],"dicas":["Manter as mãos unidas nas costas do oponente impede que ele reabra as pernas.","A pressão do peito para frente é o que gera a passagem, não só a força dos braços."],"erros":["Soltar as mãos antes de estabilizar o quadril, permitindo que o oponente refaça a guarda.","Ficar muito baixo, sem pressionar o quadril para frente."]},{"id":"t027","videoSearch":"https://www.youtube.com/results?search_query=Kimura%20da%20Guarda%20bjj%20tecnica","nome":"Kimura da Guarda","categoria":"Finalização","faixa":"azul","posicao":"Guarda Fechada","objetivo":"Torcer o ombro do oponente prendendo o pulso e o braço em chave de dobra.","passos":["Da guarda, controle um pulso do oponente com as duas mãos quando ele apoiar a mão no chão.","Gire o corpo para o lado, trazendo o braço dele para trás das costas em formato de \"L\".","Trave a chave passando o próprio braço por baixo do cotovelo dele e segurando o próprio pulso.","Gire o punho do oponente em direção às costas dele para aplicar a torção no ombro."],"dicas":["Prender o pulso antes de girar o corpo evita que o oponente puxe o braço de volta.","A força vem da rotação do tronco, não só do braço."],"erros":["Tentar girar o pulso sem antes travar bem o cotovelo.","Perder o ângulo perpendicular durante a rotação, aliviando a pressão."]},{"id":"t028","videoSearch":"https://www.youtube.com/results?search_query=Berimbolo%20(Introdu%C3%A7%C3%A3o)%20bjj%20tecnica","nome":"Berimbolo (Introdução)","categoria":"Raspagem","faixa":"azul","posicao":"De La Riva","objetivo":"Usar a guarda De La Riva para girar por baixo do oponente e chegar às costas dele.","passos":["A partir da guarda De La Riva, puxe a manga e a calça do oponente para desequilibrá-lo.","Role para trás por baixo dele, girando o corpo em torno do quadril dele.","Continue o giro até passar para o lado oposto, mantendo o gancho de De La Riva.","Finalize nas costas do oponente, inserindo os ganchos."],"dicas":["O desequilíbrio inicial com as puxadas de manga e calça facilita todo o giro.","Mantenha o gancho de De La Riva ativo do início ao fim do movimento."],"erros":["Rolar sem antes desequilibrar o oponente, o que permite que ele se sente e passe por cima.","Perder o gancho de De La Riva no meio do giro."]},{"id":"t029","videoSearch":"https://www.youtube.com/results?search_query=Guilhotina%20(Guillotine%20Choke)%20bjj%20tecnica","nome":"Guilhotina (Guillotine Choke)","categoria":"Finalização","faixa":"azul","posicao":"Em Pé","objetivo":"Estrangular o pescoço do oponente quando ele abaixa a cabeça, geralmente ao tentar uma queda.","passos":["Quando o oponente abaixar a cabeça, passe um braço por baixo do pescoço dele.","Feche a mão desse braço na dobra do outro braço, formando um \"gancho\" em volta do pescoço.","Feche a guarda ou prenda o quadril dele com as pernas para impedir que ele recue.","Puxe os cotovelos para o próprio peito e estenda o quadril para trás, fechando o estrangulamento."],"dicas":["Prender o quadril do oponente com as pernas evita que ele crie distância e alivie a pressão.","O estrangulamento fecha ao puxar os cotovelos para o peito, não ao apertar só as mãos."],"erros":["Deixar o oponente recuar o quadril, o que anula a pressão no pescoço.","Prender só a cabeça, sem envolver o pescoço corretamente."]},{"id":"t030","videoSearch":"https://www.youtube.com/results?search_query=Armlock%20do%20Monte%20bjj%20tecnica","nome":"Armlock do Monte","categoria":"Finalização","faixa":"azul","posicao":"Montada","objetivo":"Finalizar o cotovelo do oponente a partir da posição montada.","passos":["Da montada, controle um pulso do oponente com as duas mãos.","Suba o joelho correspondente até a altura da axila dele.","Gire o corpo 90°, sentando ao lado da cabeça dele e passando a perna por cima do rosto.","Feche as pernas sobre o peito, prendendo o braço, e estenda o quadril para finalizar."],"dicas":["Subir o joelho até a axila antes de girar evita que o oponente empurre e escape.","Mantenha o braço dele colado ao seu peito durante todo o giro."],"erros":["Girar o corpo sem prender bem o braço, dando espaço para o oponente tirar o cotovelo.","Deixar o joelho longe da axila, facilitando a fuga do oponente."]},{"id":"t031","videoSearch":"https://www.youtube.com/results?search_query=Estrangulamento%20D'Arce%20bjj%20tecnica","nome":"Estrangulamento D'Arce","categoria":"Finalização","faixa":"azul","posicao":"Controle Lateral","objetivo":"Estrangular o pescoço do oponente passando o braço por baixo dele e ao redor da cabeça.","passos":["Do controle de costas ou lateral, passe um braço por baixo do braço do oponente e ao redor do pescoço dele.","Feche a mão desse braço na dobra do outro braço, formando o \"gancho\" ao redor do pescoço e do braço dele.","Gire o corpo para o lado, trazendo o quadril para trás e deitando-se de lado.","Aperte os braços e estenda o quadril para fechar o estrangulamento."],"dicas":["O braço precisa envolver o pescoço, não só o queixo, para o estrangulamento funcionar.","Girar o corpo para o lado, e não puxar apenas com o braço, é o que gera a pressão final."],"erros":["Deixar o braço alto no queixo, o que reduz a eficácia da chave.","Ficar de frente para o oponente em vez de girar o corpo lateralmente."]},{"id":"t032","videoSearch":"https://www.youtube.com/results?search_query=Estrangulamento%20Anaconda%20bjj%20tecnica","nome":"Estrangulamento Anaconda","categoria":"Finalização","faixa":"azul","posicao":"Controle Lateral","objetivo":"Estrangular o oponente quando ele abaixa a cabeça, envolvendo pescoço e braço pela frente.","passos":["Quando o oponente abaixar a cabeça ao seu lado, passe um braço por baixo do pescoço e do braço dele.","Feche a mão na dobra do outro braço, prendendo pescoço e braço juntos.","Role o corpo por cima do oponente, girando na direção do braço preso.","Finalize a rolagem deitado de lado, apertando os braços para fechar o estrangulamento."],"dicas":["A rolagem por cima do oponente é o que tensiona o estrangulamento — não é só força de braço.","Prender o braço dele junto ao pescoço evita que ele retire a cabeça durante a rolagem."],"erros":["Tentar finalizar sem rolar o corpo por cima, perdendo o ângulo de pressão.","Prender só o pescoço, deixando o braço do oponente livre para se defender."]},{"id":"t033","videoSearch":"https://www.youtube.com/results?search_query=Passagem%20Joelho%20Cortando%20(Knee%20Cut%20Pass)%20bjj%20tecnica","nome":"Passagem Joelho Cortando (Knee Cut Pass)","categoria":"Passagem de Guarda","faixa":"azul","posicao":"Guarda Aberta","objetivo":"Passar a guarda cortando o joelho por cima da perna do oponente enquanto controla a manga.","passos":["Controle a manga do oponente e afaste uma das pernas dele com a outra mão.","Deslize o joelho por cima dessa perna, \"cortando\" em direção ao quadril dele.","Ao ultrapassar a perna, prenda-a entre a sua canela e o chão.","Avance o controle para o peito ou pescoço, estabilizando o lado."],"dicas":["Manter a manga controlada durante o corte evita que o oponente recupere a guarda pelo braço.","O joelho deve deslizar rente ao corpo do oponente, sem espaço entre os dois."],"erros":["Soltar a manga cedo demais, dando espaço para o oponente reagir.","Cortar o joelho longe do corpo do oponente, permitindo a recomposição da guarda."]},{"id":"t034","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%20da%20Guarda%20Aranha%20(Spider%20Guard%20Sweep)%20bjj%20tecnica","nome":"Raspagem da Guarda Aranha (Spider Guard Sweep)","categoria":"Raspagem","faixa":"azul","posicao":"Spider Guard","objetivo":"Usar os pés apoiados nos bíceps do oponente para desequilibrá-lo e raspar.","passos":["Da guarda aberta, prenda as mangas do oponente e coloque os pés nos bíceps dele (guarda aranha).","Empurre com um pé e puxe a manga do lado oposto, girando o quadril dele para o lado.","Traga a perna livre por cima, ajudando a completar a virada.","Suba por cima assim que o oponente perder o apoio das mãos."],"dicas":["A combinação de empurrar um lado e puxar o outro é o que gera o giro necessário.","Mantenha as mangas presas até finalizar a raspagem, ou o oponente recupera a base com as mãos."],"erros":["Empurrar os dois pés igualmente, sem criar uma direção clara de giro.","Soltar uma das mangas antes de o oponente perder a base."]},{"id":"t035","videoSearch":"https://www.youtube.com/results?search_query=Kimura%20da%20Meia%20Guarda%20bjj%20tecnica","nome":"Kimura da Meia Guarda","categoria":"Finalização","faixa":"azul","posicao":"Meia-Guarda","objetivo":"Aplicar a chave de kimura a partir da meia guarda, aproveitando o braço que o oponente apoia no chão.","passos":["Da meia guarda, quando o oponente apoiar a mão no chão, controle o pulso dele com as duas mãos.","Gire o corpo para o lado, trazendo o braço dele para o formato de \"L\" junto às costas.","Trave a chave passando seu braço por baixo do cotovelo dele e segurando o próprio pulso.","Gire o punho do oponente em direção às costas dele para aplicar a torção."],"dicas":["Aproveitar o momento em que o oponente busca base no chão facilita a pegada inicial.","Controle o corpo dele com as pernas da meia guarda para que não gire e escape."],"erros":["Tentar a chave sem o apoio de mão do oponente no chão, o que facilita a defesa.","Perder o controle das pernas na meia guarda durante a rotação do braço."]},{"id":"t036","videoSearch":"https://www.youtube.com/results?search_query=Estrangulamento%20Rel%C3%B3gio%20(Clock%20Choke)%20bjj%20tecnica","nome":"Estrangulamento Relógio (Clock Choke)","categoria":"Finalização","faixa":"azul","posicao":"Turtle","objetivo":"Estrangular o oponente que está de quatro apoios, \"girando\" ao redor dele como um relógio.","passos":["Com o oponente de quatro apoios e você por cima, agarre a gola próxima à nuca dele com uma mão.","Passe a outra mão por baixo da axila dele, segurando a própria manga ou pulso para reforçar.","Ande em volta do oponente na direção da gola presa, como se girasse um relógio.","Puxe a gola para cima e para o lado enquanto anda, fechando o estrangulamento."],"dicas":["O movimento de andar em volta do oponente é o que fecha a chave, não apenas a força da mão.","Manter o peso sobre as costas dele impede que ele se levante durante o giro."],"erros":["Ficar parado tentando puxar só com a força do braço.","Perder o peso sobre as costas do oponente, permitindo que ele se levante."]},{"id":"t037","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%20Old%20School%20Avan%C3%A7ada%20(Deep%20Half%20Guard)%20bjj%20tecnica","nome":"Raspagem Old School Avançada (Deep Half Guard)","categoria":"Raspagem","faixa":"azul","posicao":"Meia-Guarda","objetivo":"Raspar o oponente a partir da meia-guarda profunda, passando por baixo do quadril dele.","passos":["Da meia-guarda, afunde o corpo por baixo do quadril do oponente, ficando de lado embaixo dele.","Controle o tornozelo da perna de apoio dele com uma das mãos.","Use o ombro para elevar o quadril dele enquanto puxa o tornozelo controlado.","Complete a raspagem subindo por cima assim que ele perder a base."],"dicas":["A profundidade embaixo do quadril do oponente é o que caracteriza a \"meia-guarda profunda\".","Elevar com o ombro, e não só com os braços, gera mais força na raspagem."],"erros":["Ficar muito de lado, sem se aprofundar o suficiente embaixo do quadril.","Soltar o tornozelo controlado antes de completar a elevação."]},{"id":"t038","videoSearch":"https://www.youtube.com/results?search_query=Passagem%20X-Pass%20(do%20Turtle)%20bjj%20tecnica","nome":"Passagem X-Pass (do Turtle)","categoria":"Passagem de Guarda","faixa":"azul","posicao":"Turtle","objetivo":"Passar diretamente para o controle lateral quando o oponente está na posição de turtle.","passos":["Ao lado do oponente na posição de turtle, controle o cinto ou o quadril dele com uma mão.","Cruze a outra mão por baixo, controlando o braço distante dele.","Empurre o quadril dele para o lado oposto, \"abrindo\" a base de turtle.","Avance o corpo por cima assim que ele desabar de lado, consolidando o controle lateral."],"dicas":["O controle do cinto ou quadril é o que impede o oponente de girar durante a passagem.","Aja rapidamente assim que sentir a base dele instável."],"erros":["Empurrar sem controlar o quadril, permitindo que o oponente apenas gire no lugar.","Demorar para avançar o corpo após desestabilizar a base dele."]},{"id":"t039","videoSearch":"https://www.youtube.com/results?search_query=Estrangulamento%20Cross%20Choke%20do%20Joelho%20na%20Barriga%20bjj%20tecnica","nome":"Estrangulamento Cross Choke do Joelho na Barriga","categoria":"Finalização","faixa":"azul","posicao":"Joelho na Barriga","objetivo":"Aplicar o estrangulamento da cruz a partir do joelho na barriga, aproveitando a mobilidade da posição.","passos":["Do joelho na barriga, agarre a gola próxima profundamente com uma mão, palma para cima.","Agarre a gola oposta com a outra mão, cruzando por cima do primeiro braço.","Mantenha o joelho firme no abdômen do oponente durante todo o ajuste das pegadas.","Puxe as mãos em direções opostas, fechando a gola contra o pescoço."],"dicas":["A mobilidade do joelho na barriga permite ajustar o ângulo de finalização com facilidade.","Controle o quadril do oponente com os joelhos para que ele não escape enquanto ajusta as pegadas."],"erros":["Perder a pressão do joelho ao tentar pegar a segunda gola.","Pegar a primeira gola de forma rasa, comprometendo toda a finalização."]},{"id":"t040","videoSearch":"https://www.youtube.com/results?search_query=Passagem%20de%20Joelho%20na%20Barriga%20para%20a%20Montada%20bjj%20tecnica","nome":"Passagem de Joelho na Barriga para a Montada","categoria":"Passagem de Guarda","faixa":"azul","posicao":"Joelho na Barriga","objetivo":"Avançar do joelho na barriga diretamente para a posição montada.","passos":["Do joelho na barriga, controle o pulso distante e a gola próxima do oponente.","Deslize o joelho que está no abdômen em direção ao quadril oposto dele.","Traga a perna de trás por cima, unindo os joelhos ao redor do quadril do oponente.","Estabilize o peso centralizado assim que alcançar a montada completa."],"dicas":["O deslize do joelho deve ser rápido, aproveitando o momento de menor resistência do oponente.","Manter o controle do pulso durante toda a transição evita que ele empurre e crie espaço."],"erros":["Deslizar o joelho devagar, dando tempo do oponente recompor a defesa.","Perder o controle do pulso no meio da transição."]},{"id":"t041","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%20da%20Guarda%20Aranha%20Invertida%20bjj%20tecnica","nome":"Raspagem da Guarda Aranha Invertida","categoria":"Raspagem","faixa":"azul","posicao":"Spider Guard","objetivo":"Usar uma variação da guarda aranha, cruzando os pés para gerar um ângulo diferente de raspagem.","passos":["Da guarda aranha, cruze o pé de um lado por cima do pé do outro lado, ambos nos bíceps do oponente.","Puxe as duas mangas ao mesmo tempo, tirando o equilíbrio do oponente para a frente.","Gire o quadril para o lado enquanto solta um dos pés, direcionando a queda.","Complete o giro subindo por cima assim que o oponente perder o apoio das mãos."],"dicas":["O cruzamento dos pés cria um ângulo de desequilíbrio diferente da aranha tradicional.","Puxar as duas mangas juntas antes de soltar um pé maximiza o desequilíbrio inicial."],"erros":["Soltar os pés antes de desequilibrar bem o oponente para frente.","Puxar apenas uma manga, reduzindo a força do desequilíbrio inicial."]},{"id":"t042","videoSearch":"https://www.youtube.com/results?search_query=Estrangulamento%20com%20Manga%20Cruzada%20Profunda%20(Deep%20Cross%20Collar)%20bjj%20tecnica","nome":"Estrangulamento com Manga Cruzada Profunda (Deep Cross Collar)","categoria":"Finalização","faixa":"azul","posicao":"Guarda Fechada","objetivo":"Aprofundar a pegada do estrangulamento da cruz para aumentar a força de finalização a partir da guarda fechada.","passos":["Da guarda fechada, busque a gola oposta com a palma para cima, inserindo a mão o mais fundo possível, além da nuca.","Agarre a outra gola com a segunda mão, também de forma profunda.","Feche os joelhos e quadril para impedir que o oponente crie distância.","Puxe as mãos para baixo e para os lados, fechando o estrangulamento com a pegada profunda."],"dicas":["Quanto mais funda a primeira pegada, menos força é necessária para fechar o estrangulamento.","Manter a guarda fechada firme durante o ajuste das mãos evita que o oponente escape."],"erros":["Conformar-se com uma pegada rasa por impaciência.","Abrir a guarda antes de finalizar, dando espaço para o oponente se defender."]},{"id":"t043","videoSearch":"https://www.youtube.com/results?search_query=Chave%20de%20Tornozelo%20do%20Turtle%20bjj%20tecnica","nome":"Chave de Tornozelo do Turtle","categoria":"Finalização","faixa":"azul","posicao":"Turtle","objetivo":"Finalizar o tornozelo do oponente enquanto ele ainda está na posição de turtle, antes que ele se estabilize.","passos":["Ao lado do oponente em turtle, controle um dos pés dele com as duas mãos.","Sente-se em direção à perna controlada, alinhando o corpo para a chave.","Posicione o antebraço sob o tendão de Aquiles, controlando o joelho com a outra mão.","Estenda o quadril para trás, aplicando pressão gradual no tornozelo."],"dicas":["Aproveite o momento em que o oponente está mais preocupado em se defender de outros ataques.","Controlar o joelho é essencial para não perder a chave caso ele tente girar a perna."],"erros":["Tentar a chave sem prender bem o pé, permitindo que o oponente puxe a perna.","Aplicar a pressão rápido demais em vez de gradual."]},{"id":"t044","videoSearch":"https://www.youtube.com/results?search_query=Kimura%20do%20Norte-Sul%20bjj%20tecnica","nome":"Kimura do Norte-Sul","categoria":"Finalização","faixa":"azul","posicao":"Norte-Sul","objetivo":"Aplicar a chave de kimura a partir da posição norte-sul, aproveitando o braço exposto do oponente.","passos":["Na posição norte-sul, quando o oponente tentar empurrar com um braço, capture o pulso dele.","Gire o corpo para o lado, trazendo o braço dele para o formato de \"L\".","Trave a chave passando o braço por baixo do cotovelo dele e segurando o próprio pulso.","Gire o punho dele em direção às costas, aplicando a torção no ombro."],"dicas":["O braço de empurrar do oponente na posição norte-sul é uma oportunidade natural para a kimura.","Mantenha o peso do corpo sobre ele durante toda a aplicação, para que não gire e escape."],"erros":["Perder o peso sobre o oponente ao girar o corpo para travar a chave.","Tentar a chave sem capturar bem o pulso primeiro."]},{"id":"t045","videoSearch":"https://www.youtube.com/results?search_query=Berimbolo%20Completo%20bjj%20tecnica","nome":"Berimbolo Completo","categoria":"Raspagem","faixa":"roxa","posicao":"De La Riva","objetivo":"Executar a sequência completa de berimbolo, incluindo as variações de finalização nas costas.","passos":["Estabeleça a guarda De La Riva com gancho profundo e controle de manga.","Puxe e desequilibre o oponente lateralmente, criando o momento para o giro.","Gire por baixo, passando de um lado ao outro e mantendo o gancho ativo.","Ao chegar atrás, insira imediatamente os ganchos e controle o cinto ou a lapela para as costas."],"dicas":["Cada detalhe do desequilíbrio inicial define a velocidade e o sucesso do giro.","Priorize sempre inserir os ganchos antes de buscar submissões nas costas."],"erros":["Girar sem o desequilíbrio correto, permitindo que o oponente passe a guarda no meio do movimento.","Demorar para inserir os ganchos ao chegar atrás, perdendo a posição."]},{"id":"t046","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%20De%20La%20Riva%20bjj%20tecnica","nome":"Raspagem De La Riva","categoria":"Raspagem","faixa":"roxa","posicao":"De La Riva","objetivo":"Raspar o oponente a partir do gancho de De La Riva, usando a base dele contra ele mesmo.","passos":["Coloque o gancho de De La Riva (pé por fora, na coxa do oponente) e controle a manga do lado do gancho.","Puxe a manga e empurre com o pé, tirando o equilíbrio do oponente para trás.","Gire o corpo, trazendo a perna de trás para ajudar a levantar o quadril dele.","Complete o giro para cima, terminando na posição de cavaleiro ou joelho na barriga."],"dicas":["A combinação de puxar a manga e empurrar com o gancho é o que desestabiliza o oponente.","Use a perna de trás como alavanca extra na finalização da raspagem."],"erros":["Empurrar só com a perna, sem puxar a manga.","Perder o gancho antes de completar o giro."]},{"id":"t047","videoSearch":"https://www.youtube.com/results?search_query=Leg%20Drag%20(Passagem%20por%20Arrasto%20de%20Perna)%20bjj%20tecnica","nome":"Leg Drag (Passagem por Arrasto de Perna)","categoria":"Passagem de Guarda","faixa":"roxa","posicao":"Guarda Aberta","objetivo":"Arrastar a perna do oponente para o lado oposto do corpo, eliminando os ângulos de guarda dele.","passos":["Controle o tornozelo do oponente e cruze-o por cima do seu quadril.","Pressione o joelho dele contra o chão, \"arrastando\" a perna para o lado oposto.","Avance o quadril por cima da perna arrastada, eliminando o espaço para guardas com essa perna.","Estabilize o controle de cabeça e braço antes de finalizar a passagem."],"dicas":["Manter a perna do oponente cruzada e presa junto ao seu quadril impede que ele a recupere.","Avance com pressão constante, sem tirar o peso da perna arrastada."],"erros":["Soltar a perna arrastada cedo demais, permitindo a recomposição de guarda.","Avançar sem eliminar o espaço lateral, dando chance para guardas como De La Riva."]},{"id":"t048","videoSearch":"https://www.youtube.com/results?search_query=Tor%C3%A7%C3%A3o%20de%20Perna%20(Calf%20Slicer)%20bjj%20tecnica","nome":"Torção de Perna (Calf Slicer)","categoria":"Finalização","faixa":"roxa","posicao":"50/50","objetivo":"Finalizar pressionando a panturrilha do oponente contra a própria perna dobrada.","passos":["Prenda uma das pernas do oponente dobrada, com o calcanhar próximo ao glúteo dele.","Passe sua canela por trás do joelho dele, criando uma \"tesoura\" na dobra.","Controle o corpo do oponente para impedir que ele gire e alivie a pressão.","Feche a tesoura com as pernas, pressionando a panturrilha contra o próprio músculo posterior da coxa."],"dicas":["Aplique a pressão de forma gradual — é uma finalização sensível a lesões se feita bruscamente.","Controlar o quadril do oponente evita que ele escape girando o corpo."],"erros":["Aplicar a pressão de forma brusca e rápida, aumentando o risco de lesão desnecessária.","Deixar o oponente girar o quadril, o que anula a chave."]},{"id":"t049","videoSearch":"https://www.youtube.com/results?search_query=Estrangulamento%20Ezequiel%20bjj%20tecnica","nome":"Estrangulamento Ezequiel","categoria":"Finalização","faixa":"roxa","posicao":"Montada","objetivo":"Estrangular usando a manga do próprio kimono, a partir da montada ou guarda.","passos":["Com um braço por trás da cabeça do oponente, segure a própria manga com essa mão.","Coloque a outra mão, com os dedos dobrados, contra o pescoço dele, palma para baixo.","Pressione a manga contra a garganta do oponente com o antebraço.","Feche o estrangulamento puxando os cotovelos para dentro."],"dicas":["A mão de trás da cabeça ajuda a evitar que o oponente escape para o lado.","A pressão vem do antebraço contra a garganta, não da força dos dedos."],"erros":["Colocar a mão baixa demais, pressionando o queixo em vez do pescoço.","Não fixar bem a manga, perdendo tensão no estrangulamento."]},{"id":"t050","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%20da%20Guarda%20X%20bjj%20tecnica","nome":"Raspagem da Guarda X","categoria":"Raspagem","faixa":"roxa","posicao":"Guarda Aberta","objetivo":"Usar a guarda X para desequilibrar e derrubar o oponente que está de pé.","passos":["Estabeleça a guarda X, com um pé no quadril e o outro atrás do joelho do oponente, por dentro da perna dele.","Puxe a perna controlada para cima, tirando a base do oponente.","Ao senti-lo desequilibrar, empurre com a perna que está no quadril, completando a virada.","Suba rapidamente para consolidar a posição de cima."],"dicas":["A guarda X funciona melhor combinada com o controle de uma manga ou pulso.","O tempo da puxada da perna precisa coincidir com o momento em que o oponente muda o peso."],"erros":["Tentar raspar sem antes desequilibrar o peso do oponente.","Perder o gancho da guarda X antes de completar a virada."]},{"id":"t051","videoSearch":"https://www.youtube.com/results?search_query=Passagem%20Toreando%20bjj%20tecnica","nome":"Passagem Toreando","categoria":"Passagem de Guarda","faixa":"roxa","posicao":"Guarda Aberta","objetivo":"Passar a guarda aberta de pé, desviando as pernas do oponente para o lado como em um passe de toureiro.","passos":["De pé, segure as duas calças do oponente próximo aos tornozelos.","Puxe as pernas dele para um lado enquanto se desloca rapidamente para o lado oposto.","Mantenha os joelhos dele juntos e controlados enquanto avança o quadril.","Estabilize o controle lateral assim que ultrapassar as pernas."],"dicas":["A velocidade do deslocamento lateral é mais importante que a força da puxada.","Mantenha o quadril baixo para não ser derrubado durante a passagem."],"erros":["Passar devagar, dando tempo do oponente recompor a guarda.","Soltar uma das pernas antes de estabilizar o controle final."]},{"id":"t052","videoSearch":"https://www.youtube.com/results?search_query=Loop%20Choke%20bjj%20tecnica","nome":"Loop Choke","categoria":"Finalização","faixa":"roxa","posicao":"Guarda Aberta","objetivo":"Estrangular o oponente quando ele abaixa a cabeça para passar a guarda, usando a própria gola dele.","passos":["Quando o oponente abaixar a cabeça, passe um braço por cima do pescoço dele.","Agarre a gola oposta e gire o pulso para fora, criando pressão na lateral do pescoço.","Use a outra mão para ajudar a girar a cabeça dele em direção à pressão.","Feche o estrangulamento levando o cotovelo para baixo e puxando a gola."],"dicas":["O giro do pulso é o que transforma a pegada em pressão de estrangulamento.","Funciona melhor combinado com uma guilhotina como ameaça inicial."],"erros":["Puxar a gola em linha reta, sem girar o pulso.","Perder o ângulo de cabeça abaixada do oponente antes de fechar a chave."]},{"id":"t053","videoSearch":"https://www.youtube.com/results?search_query=Estrangulamento%20Tri%C3%A2ngulo%20Invertido%20(Reverse%20Triangle)%20bjj%20tecnica","nome":"Estrangulamento Triângulo Invertido (Reverse Triangle)","categoria":"Finalização","faixa":"roxa","posicao":"Guarda Aberta","objetivo":"Aplicar o triângulo a partir de um ângulo invertido, geralmente durante transições de guarda.","passos":["A partir de uma posição invertida ou de transição, prenda a cabeça do oponente entre as pernas.","Cruze os pés e trave o joelho atrás do próprio joelho, como no triângulo tradicional.","Ajuste o ângulo do quadril para debaixo do braço livre do oponente, mesmo na posição invertida.","Puxe a cabeça dele para baixo, fechando o estrangulamento com a pressão das pernas."],"dicas":["A dificuldade principal é manter o ângulo correto mesmo invertido — pratique a transição devagar.","Controlar o braço livre do oponente com as mãos ajuda a manter a posição durante o ajuste."],"erros":["Perder o ângulo ao tentar se ajustar da posição invertida.","Fechar as pernas antes de garantir o posicionamento correto do quadril."]},{"id":"t054","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%20da%20Guarda%20Lasso%20bjj%20tecnica","nome":"Raspagem da Guarda Lasso","categoria":"Raspagem","faixa":"roxa","posicao":"Lasso Guard","objetivo":"Usar a manga enrolada na perna (guarda lasso) para desequilibrar e raspar o oponente.","passos":["Prenda a manga do oponente e enrole-a com a própria perna, criando a guarda lasso.","Use o pé livre no quadril ou coxa dele para controlar a distância.","Puxe a manga enrolada enquanto empurra com o pé livre, girando o oponente para o lado.","Complete o giro subindo por cima, mantendo a manga controlada até estabilizar."],"dicas":["A trava do lasso na manga precisa estar firme antes de iniciar a puxada.","Combine com ataques na perna livre (raspagens ou triângulos) para criar mais opções."],"erros":["Enrolar a manga de forma frouxa, perdendo a trava durante a puxada.","Negligenciar o controle de distância com o pé livre, permitindo que o oponente se aproxime."]},{"id":"t055","videoSearch":"https://www.youtube.com/results?search_query=Passagem%20por%20Cima%20com%20Underhook%20bjj%20tecnica","nome":"Passagem por Cima com Underhook","categoria":"Passagem de Guarda","faixa":"roxa","posicao":"Guarda Aberta","objetivo":"Passar a guarda controlando uma perna por cima e estabelecendo underhook no mesmo lado.","passos":["Controle uma perna do oponente por cima com um braço, pressionando-a para o lado.","Com o outro braço, busque um underhook (passar o braço por baixo do braço dele) do mesmo lado.","Combine a pressão da perna controlada com a puxada do underhook para girar o quadril dele.","Avance o corpo por cima da perna controlada até estabilizar o controle lateral."],"dicas":["O underhook deve vir logo após o controle da perna, sem dar tempo do oponente se ajustar.","Mantenha o peso avançado sobre a perna controlada durante toda a passagem."],"erros":["Buscar o underhook antes de controlar bem a perna, perdendo a base da passagem.","Recuar o quadril no meio do movimento, aliviando a pressão sobre o oponente."]},{"id":"t056","videoSearch":"https://www.youtube.com/results?search_query=Kimura%20da%20Meia%20Guarda%20Aranha%20(Spider%20Half)%20bjj%20tecnica","nome":"Kimura da Meia Guarda Aranha (Spider Half)","categoria":"Finalização","faixa":"roxa","posicao":"Meia-Guarda","objetivo":"Aplicar a kimura a partir da meia guarda combinada com o controle de manga típico da guarda aranha.","passos":["Da meia guarda, controle a manga do oponente com o pé no bíceps dele, como na guarda aranha.","Solte o pé e use as duas mãos para prender o pulso dele, formando o \"L\" do braço.","Trave a chave passando o braço por baixo do cotovelo e segurando o próprio pulso.","Gire o quadril e o punho dele em direção às costas para fechar a torção no ombro."],"dicas":["O controle prévio da manga com o pé facilita capturar o pulso no momento certo.","Mantenha as pernas ativas na meia guarda para impedir que o oponente gire e escape."],"erros":["Soltar o controle da manga cedo demais, perdendo a chance de travar o pulso.","Deixar o oponente girar o corpo livremente durante a aplicação da chave."]},{"id":"t057","videoSearch":"https://www.youtube.com/results?search_query=Estrangulamento%20Norte-Sul%20(North-South%20Choke)%20bjj%20tecnica","nome":"Estrangulamento Norte-Sul (North-South Choke)","categoria":"Finalização","faixa":"roxa","posicao":"Norte-Sul","objetivo":"Estrangular o oponente a partir da posição norte-sul, usando o próprio peso do corpo e o antebraço.","passos":["Estabeleça a posição norte-sul, com a cabeça na altura do quadril do oponente e vice-versa.","Passe um braço por baixo do pescoço dele, com a mão fechando na dobra do outro braço.","Ajuste o quadril para pressionar o peso sobre a parte de cima do corpo dele.","Aperte os braços e afunde o peso para fechar o estrangulamento."],"dicas":["O peso do corpo pressionando para baixo é o que fecha a chave, mais do que a força dos braços.","Controlar os braços do oponente antes de buscar o estrangulamento evita que ele se defenda."],"erros":["Ficar com o quadril longe do corpo do oponente, perdendo a pressão de peso.","Buscar a chave sem antes neutralizar as mãos de defesa dele."]},{"id":"t058","videoSearch":"https://www.youtube.com/results?search_query=Chave%20de%20Joelho%20Reta%20do%2050%2F50%20(Straight%20Kneebar)%20bjj%20tecnica","nome":"Chave de Joelho Reta do 50/50 (Straight Kneebar)","categoria":"Finalização","faixa":"roxa","posicao":"50/50","objetivo":"Finalizar o joelho do oponente a partir do 50/50, estendendo a perna dele contra a articulação.","passos":["Na posição 50/50, controle a perna do oponente junto ao seu peito, com o joelho dele alinhado ao seu corpo.","Prenda o pé dele por baixo do braço, impedindo que ele gire.","Trave o próprio corpo em linha com a perna dele para garantir alavanca reta, sem torção.","Estenda o quadril para trás, aplicando pressão direta na articulação do joelho."],"dicas":["A chave deve ser reta, sem rotação — isso reduz o risco de lesão e mantém o controle técnico.","Controlar o pé impede que o oponente gire a perna para aliviar a pressão."],"erros":["Adicionar rotação à chave sem necessidade, aumentando o risco de lesão.","Perder o alinhamento do corpo com a perna do oponente, reduzindo a eficácia da alavanca."]},{"id":"t059","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%20da%20Meia-Guarda%20com%20Gancho%20(Shin%20to%20Shin%20Sweep)%20bjj%20tecnica","nome":"Raspagem da Meia-Guarda com Gancho (Shin to Shin Sweep)","categoria":"Raspagem","faixa":"roxa","posicao":"Meia-Guarda","objetivo":"Raspar o oponente conectando a própria canela à canela dele, criando uma alavanca de giro.","passos":["Da meia-guarda, posicione a própria canela contra a canela da perna de apoio do oponente.","Controle a manga e o pulso dele do lado do gancho de canela.","Empurre com a canela enquanto puxa a manga, girando o corpo dele para o lado.","Complete o giro subindo por cima assim que ele perder a base."],"dicas":["O contato canela a canela funciona como uma alavanca — mantenha-o firme durante todo o movimento.","A puxada de manga deve acontecer no mesmo instante do empurrão da canela."],"erros":["Empurrar com a canela sem puxar a manga, perdendo a direção do giro.","Perder o contato de canela no meio do movimento."]},{"id":"t060","videoSearch":"https://www.youtube.com/results?search_query=Passagem%20por%20Cima%20do%20Joelho%20na%20Barriga%20(Knee-on-Belly%20Transition)%20bjj%20tecnica","nome":"Passagem por Cima do Joelho na Barriga (Knee-on-Belly Transition)","categoria":"Passagem de Guarda","faixa":"roxa","posicao":"Joelho na Barriga","objetivo":"Usar o joelho na barriga como posição de transição rápida entre o controle lateral e as costas ou montada.","passos":["Do controle lateral, suba o joelho até o abdômen do oponente, mantendo o pulso distante controlado.","Observe a reação de defesa dele — se ele empurrar, use o impulso para girar às costas.","Se ele tentar recuar o quadril, avance o joelho até a montada.","Ajuste a transição escolhida mantendo sempre o controle do pulso."],"dicas":["A força de transição vem da reação do próprio oponente — leia o movimento dele antes de decidir o destino.","Nunca solte o controle do pulso distante durante as transições."],"erros":["Escolher a transição antes de observar a reação do oponente, perdendo eficiência.","Soltar o pulso durante a mudança de posição."]},{"id":"t061","videoSearch":"https://www.youtube.com/results?search_query=Guilhotina%20Alta%20na%20Guarda%20Fechada%20(High%20Elbow%20Guillotine)%20bjj%20tecnica","nome":"Guilhotina Alta na Guarda Fechada (High Elbow Guillotine)","categoria":"Finalização","faixa":"roxa","posicao":"Guarda Fechada","objetivo":"Aplicar a guilhotina com o cotovelo elevado a partir da guarda fechada, aumentando a força de estrangulamento.","passos":["Da guarda fechada, quando o oponente abaixar a cabeça, passe um braço por baixo do pescoço dele.","Eleve o cotovelo desse braço para cima, em vez de mantê-lo baixo junto ao peito.","Feche a mão na dobra do outro braço, mantendo o cotovelo elevado.","Feche as pernas ao redor do corpo dele e estenda o quadril, fechando o estrangulamento com o ângulo elevado."],"dicas":["O cotovelo elevado muda o ângulo de pressão para a lateral do pescoço, sendo mais difícil de defender.","Fechar bem a guarda impede que o oponente recue e alivie a pressão."],"erros":["Manter o cotovelo baixo, que resulta no estrangulamento tradicional, mais fácil de defender.","Abrir a guarda antes de fechar a chave, perdendo o controle de distância."]},{"id":"t062","videoSearch":"https://www.youtube.com/results?search_query=Kimura%20da%20Guarda%20Lasso%20bjj%20tecnica","nome":"Kimura da Guarda Lasso","categoria":"Finalização","faixa":"roxa","posicao":"Lasso Guard","objetivo":"Aplicar a kimura combinando o controle de manga da guarda lasso com a trava tradicional do braço.","passos":["Da guarda lasso, com a manga já enrolada na perna, controle o pulso do mesmo braço com as duas mãos.","Gire o corpo para o lado, usando a perna do lasso para impedir que o oponente recue o braço.","Trave a chave passando o braço por baixo do cotovelo dele e segurando o próprio pulso.","Gire o punho em direção às costas dele, fechando a torção no ombro."],"dicas":["A perna do lasso funciona como uma trava extra, dificultando a defesa do oponente.","Mantenha o enrolamento da manga firme durante toda a aplicação da chave."],"erros":["Perder o enrolamento do lasso durante a rotação do corpo.","Tentar a chave sem aproveitar a trava extra que o lasso oferece."]},{"id":"t063","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%20do%2050%2F50%20bjj%20tecnica","nome":"Raspagem do 50/50","categoria":"Raspagem","faixa":"roxa","posicao":"50/50","objetivo":"Raspar o oponente diretamente a partir da posição 50/50, sem buscar uma finalização de perna.","passos":["Na posição 50/50, controle a manga ou o pulso do oponente do lado oposto ao gancho de pernas.","Puxe esse braço enquanto gira o quadril na direção contrária, desequilibrando-o para trás.","Use a pressão das pernas entrelaçadas para impedir que ele recomponha a base.","Complete o giro, terminando por cima em controle de perna ou lateral."],"dicas":["O 50/50 é uma posição neutra — o desequilíbrio vem do controle superior de braço, não das pernas.","Mantenha a pressão das pernas constante durante todo o giro."],"erros":["Tentar raspar sem controlar nenhum braço do oponente.","Soltar a trava de pernas antes de completar o giro."]},{"id":"t064","videoSearch":"https://www.youtube.com/results?search_query=Chave%20de%20Tornozelo%20do%20Turtle%20Avan%C3%A7ada%20bjj%20tecnica","nome":"Chave de Tornozelo do Turtle Avançada","categoria":"Finalização","faixa":"roxa","posicao":"Turtle","objetivo":"Finalizar o tornozelo do oponente aproveitando uma perna exposta durante a defesa da posição de turtle.","passos":["Ao lado do oponente em turtle, identifique a perna que fica mais exposta quando ele defende o outro lado.","Prenda essa perna junto ao seu quadril, controlando o pé com as duas mãos.","Gire o corpo para alinhar a pressão reta no tendão de Aquiles.","Estenda o quadril para trás, aplicando a pressão de forma gradual."],"dicas":["Aproveite o instante em que o oponente está concentrado em defender ataques na parte de cima.","Controlar o joelho da perna presa evita que ele gire e escape da chave."],"erros":["Tentar a chave em uma perna que ainda está bem apoiada e móvel.","Negligenciar o controle do joelho, focando apenas no pé."]},{"id":"t065","videoSearch":"https://www.youtube.com/results?search_query=Armlock%20do%20Norte-Sul%20bjj%20tecnica","nome":"Armlock do Norte-Sul","categoria":"Finalização","faixa":"roxa","posicao":"Norte-Sul","objetivo":"Finalizar o cotovelo do oponente a partir da posição norte-sul, usando o peso do corpo a favor.","passos":["Na posição norte-sul, controle um braço do oponente junto ao seu corpo.","Gire o quadril na direção desse braço, trazendo a perna por cima da cabeça dele.","Sente-se próximo ao ombro dele, prendendo o braço entre as pernas.","Estenda o quadril para cima, aplicando a pressão no cotovelo."],"dicas":["A posição norte-sul já oferece um bom ângulo de partida — o giro do quadril deve ser rápido para surpreender o oponente.","Prender bem o braço com as pernas evita que ele gire e escape antes da finalização."],"erros":["Girar devagar, dando tempo do oponente puxar o braço de volta.","Deixar espaço entre as pernas, permitindo que ele retire o cotovelo."]},{"id":"t066","videoSearch":"https://www.youtube.com/results?search_query=Passagem%20da%20Guarda%20Aranha%20(Spider%20Guard%20Pass)%20bjj%20tecnica","nome":"Passagem da Guarda Aranha (Spider Guard Pass)","categoria":"Passagem de Guarda","faixa":"roxa","posicao":"Spider Guard","objetivo":"Neutralizar os pés do oponente na guarda aranha e avançar para o controle lateral.","passos":["De pé ou ajoelhado, sinta os pés do oponente pressionando seus bíceps na guarda aranha.","Gire os braços para dentro, quebrando o ângulo de pressão dos pés dele.","Avance o corpo em direção a um dos lados, empurrando a perna correspondente para o chão.","Consolide o controle lateral assim que ultrapassar os pés dele."],"dicas":["Girar os braços para dentro é mais eficiente do que tentar apenas puxá-los para trás.","Avance sempre em direção ao lado onde a pressão do pé estiver mais fraca."],"erros":["Puxar os braços para trás sem girar, o que não quebra a pressão dos pés.","Avançar devagar, dando tempo do oponente reajustar a guarda aranha."]},{"id":"t067","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%20da%20Guarda%20de%20Lapela%20(Worm%20Guard)%20bjj%20tecnica","nome":"Raspagem da Guarda de Lapela (Worm Guard)","categoria":"Raspagem","faixa":"marrom","posicao":"Guarda Aberta","objetivo":"Usar a própria lapela como amarração para desequilibrar e raspar o oponente.","passos":["Passe a lapela por trás da perna do oponente e amarre no seu próprio quadril ou pé.","Use a tensão da amarração para limitar os movimentos de base do oponente.","Combine com um gancho de guarda (como De La Riva) para criar ângulo de raspagem.","Puxe a lapela e o gancho simultaneamente para completar a virada."],"dicas":["A amarração de lapela funciona como uma \"perna extra\" — use-a para limitar reações do oponente.","Sincronizar a puxada da lapela com o gancho de perna é o que gera a raspagem."],"erros":["Amarrar a lapela frouxa, perdendo tensão no momento da raspagem.","Depender só da lapela, sem usar um gancho de perna em conjunto."]},{"id":"t068","videoSearch":"https://www.youtube.com/results?search_query=Chave%20de%20Calcanhar%20(Heel%20Hook)%20a%20partir%20do%2050%2F50%20bjj%20tecnica","nome":"Chave de Calcanhar (Heel Hook) a partir do 50/50","categoria":"Finalização","faixa":"marrom","posicao":"50/50","objetivo":"Finalizar torcendo o calcanhar do oponente a partir da posição 50/50.","passos":["Na posição 50/50, controle o pé do oponente por baixo do braço, com o calcanhar exposto.","Trave o pé dele junto ao seu peito, sem deixar espaço para giro.","Controle o joelho dele com a outra mão para impedir rotação da perna.","Gire o corpo para o lado, aplicando torção rotacional no calcanhar de forma gradual."],"dicas":["É uma finalização de alto risco de lesão — pratique sempre com controle e libere ao primeiro sinal de batida (tap).","Controlar o joelho do oponente é tão importante quanto controlar o pé."],"erros":["Aplicar a torção de forma rápida e brusca, sem dar tempo do parceiro bater.","Perder o controle do joelho, permitindo que o oponente gire junto e alivie a pressão."]},{"id":"t069","videoSearch":"https://www.youtube.com/results?search_query=Baseball%20Bat%20Choke%20bjj%20tecnica","nome":"Baseball Bat Choke","categoria":"Finalização","faixa":"marrom","posicao":"Controle Lateral","objetivo":"Estrangular a partir do controle lateral, segurando a gola como se fosse um taco de baseball.","passos":["Do controle lateral, agarre a gola próxima à nuca do oponente com uma mão, polegar para dentro.","Agarre a mesma gola mais abaixo com a outra mão, formando uma pegada de \"taco\".","Gire o corpo, trazendo os quadris por cima da cabeça do oponente.","Puxe as mãos em direções opostas como se girasse um bastão, fechando o estrangulamento."],"dicas":["O giro do quadril por cima da cabeça é essencial para a pressão funcionar.","Mantenha os cotovelos próximos ao corpo durante o giro."],"erros":["Puxar a gola sem girar o quadril por cima da cabeça do oponente.","Pegar a gola muito baixa, perdendo pressão no pescoço."]},{"id":"t070","videoSearch":"https://www.youtube.com/results?search_query=Passagem%20com%20Controle%20de%20Corpo%20(Body%20Lock%20Pass)%20bjj%20tecnica","nome":"Passagem com Controle de Corpo (Body Lock Pass)","categoria":"Passagem de Guarda","faixa":"marrom","posicao":"Guarda Aberta","objetivo":"Passar a guarda abraçando o corpo do oponente e usando pressão de quadril constante.","passos":["Ajoelhado, abrace a cintura do oponente por baixo das pernas dele, unindo as mãos.","Suba o quadril colado ao dele, eliminando espaço para os pés do oponente empurrarem.","Ande em círculo pressionando o quadril, forçando as pernas dele a abrirem de um lado.","Assim que uma perna cair, estabilize o controle lateral."],"dicas":["A pressão do abraço deve ser constante — qualquer espaço permite que o oponente reajuste os pés.","Movimente-se em arco, nunca recuando o quadril durante a passagem."],"erros":["Recuar o quadril durante a passagem, dando espaço para o oponente empurrar de volta.","Soltar o abraço antes de garantir o controle final."]},{"id":"t071","videoSearch":"https://www.youtube.com/results?search_query=Raspagem%20Reverse%20De%20La%20Riva%20bjj%20tecnica","nome":"Raspagem Reverse De La Riva","categoria":"Raspagem","faixa":"marrom","posicao":"De La Riva","objetivo":"Raspar usando o gancho invertido de De La Riva, atacando por trás do joelho do oponente.","passos":["Coloque o pé por dentro da coxa do oponente, gancho invertido, com o corpo levemente rodado.","Controle a calça ou o tornozelo do lado oposto para limitar a base dele.","Puxe o gancho enquanto gira o quadril para trás, tirando o equilíbrio do oponente.","Complete o giro, subindo para o controle de costas ou joelho na barriga."],"dicas":["O gancho invertido funciona melhor combinado com controle de tornozelo do lado oposto.","O giro do quadril, e não só a puxada do gancho, é o que gera a queda."],"erros":["Manter o corpo muito de frente, sem girar o quadril para o ataque.","Perder o controle de tornozelo antes de completar a raspagem."]},{"id":"t072","videoSearch":"https://www.youtube.com/results?search_query=Sistema%20Kimura%20Trap%20(Raspagem)%20bjj%20tecnica","nome":"Sistema Kimura Trap (Raspagem)","categoria":"Raspagem","faixa":"marrom","posicao":"Guarda Aberta","objetivo":"Usar a chave de kimura como amarração para desequilibrar e raspar o oponente, sem necessariamente finalizar.","passos":["Trave a chave de kimura em um oponente que está de joelhos, sem aplicar torção ainda.","Use a chave como alavanca, puxando o braço dele para desequilibrar o tronco.","Traga a perna por cima do braço preso, criando uma trava adicional (kimura trap).","Puxe o conjunto braço-quadril para completar a virada e subir por cima."],"dicas":["A kimura, mesmo sem finalizar, é uma alavanca poderosa para desequilibrar.","Prender a perna por cima do braço evita que o oponente gire e escape da raspagem."],"erros":["Focar só na finalização da kimura e ignorar a oportunidade de raspagem.","Soltar a trava do braço no meio da virada."]},{"id":"t073","videoSearch":"https://www.youtube.com/results?search_query=Estrangulamento%20Bow%20and%20Arrow%20bjj%20tecnica","nome":"Estrangulamento Bow and Arrow","categoria":"Finalização","faixa":"marrom","posicao":"Costas","objetivo":"Estrangular a partir das costas, usando a perna do oponente como alavanca em formato de \"arco e flecha\".","passos":["Com as costas do oponente controladas, agarre a gola funda com uma mão.","Segure a calça ou tornozelo do oponente do lado oposto com a outra mão.","Deite-se para o lado, esticando o corpo do oponente como um arco.","Puxe a gola e a perna em direções opostas, fechando o estrangulamento pela tensão."],"dicas":["A extensão do corpo do oponente é o que fecha o estrangulamento — não é só a força da mão na gola.","Manter os ganchos ou controle das costas ativo evita que o oponente gire e escape."],"erros":["Puxar só a gola, sem esticar o corpo do oponente com a perna.","Perder o controle das costas antes de completar a extensão."]},{"id":"t074","videoSearch":"https://www.youtube.com/results?search_query=Chave%20de%20Tornozelo%20do%2050%2F50%20(Straight%20Ankle%20Lock)%20bjj%20tecnica","nome":"Ch
